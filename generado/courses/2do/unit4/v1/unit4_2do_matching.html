<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matching — The Best City Ever</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',Arial,sans-serif;background:#f0f4ff;min-height:100vh;padding:20px;color:#1e293b}
  h1{text-align:center;font-size:1.6rem;font-weight:800;color:#1e40af;margin-bottom:6px}
  .subtitle{text-align:center;color:#64748b;margin-bottom:28px;font-size:.9rem}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;transition:all .15s}
  button:hover{opacity:.88;transform:translateY(-1px)}

.container{max-width:680px;margin:0 auto}
.score{text-align:center;font-size:.95rem;color:#64748b;margin-bottom:18px;font-weight:700}
.columns{display:grid;grid-template-columns:1fr 1fr;gap:16px;align-items:start}
.col{display:flex;flex-direction:column;gap:10px}
.col-title{text-align:center;font-size:.78rem;font-weight:800;color:#94a3b8;letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
/* Tarjetas de palabra */
.word-card{
  padding:14px 18px;border-radius:14px;border:2.5px solid #e2e8f0;background:white;
  font-weight:800;font-size:1.05rem;cursor:pointer;text-align:center;
  transition:all .2s;user-select:none;color:#1e293b;
}
.word-card:hover:not(.matched){border-color:#6366f1;background:#eff6ff;color:#4338ca}
.word-card.selected{border-color:#6366f1;background:#eff6ff;color:#4338ca;transform:scale(1.03);box-shadow:0 4px 14px rgba(99,102,241,.25)}
.word-card.matched{border-color:#22c55e;background:#dcfce7;color:#15803d;cursor:default}
.word-card.wrong{border-color:#ef4444;background:#fee2e2;animation:shake .35s}
/* Tarjetas de emoji */
.emoji-card{
  border-radius:16px;border:3px solid #e2e8f0;background:white;
  cursor:pointer;text-align:center;padding:16px 10px 12px;
  transition:all .2s;user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.emoji-card:hover:not(.matched){border-color:#6366f1;background:#eff6ff;transform:translateY(-2px);box-shadow:0 6px 18px rgba(99,102,241,.2)}
.emoji-card.selected{border-color:#6366f1;background:#eff6ff;transform:translateY(-2px);box-shadow:0 6px 18px rgba(99,102,241,.3)}
.emoji-card.matched{border-color:#22c55e;background:#dcfce7;cursor:default}
.emoji-card.wrong{border-color:#ef4444;background:#fee2e2;animation:shake .35s}
.emoji-card .em{font-size:3rem;line-height:1;display:block}
.emoji-card .word-reveal{font-size:.78rem;font-weight:800;color:#15803d;min-height:1rem;opacity:0;transition:opacity .3s;letter-spacing:.02em}
.emoji-card.matched .word-reveal{opacity:1}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.btn{padding:10px 24px;font-size:1rem;background:#6366f1;color:white;display:block;margin:20px auto 0}
.celebrate{text-align:center;font-size:1.3rem;font-weight:800;color:#16a34a;margin-top:16px;display:none}
</style></head><body>
<div class="container">
  <h1>🔗 Matching</h1>
  <p class="subtitle">The Best City Ever · 2do Grado</p>
  <div class="score">Pares: <span id="found">0</span> / <span id="total">0</span> &nbsp;·&nbsp; Intentos: <span id="tries">0</span></div>
  <div class="columns">
    <div class="col">
      <div class="col-title">📝 English word</div>
      <div id="left"></div>
    </div>
    <div class="col">
      <div class="col-title">🖼️ Picture</div>
      <div id="right" style="display:flex;flex-direction:column;gap:10px"></div>
    </div>
  </div>
  <div class="celebrate" id="cel">🎉 ¡Excelente! ¡Completaste el matching!</div>
  <button class="btn" onclick="init()">🔄 Reiniciar</button>
</div>
<script>
const PAIRS=[{"word":"Bank","emoji":"🏦💰"},{"word":"Bookstore","emoji":"📚🔖"},{"word":"Bus Stop","emoji":"🚌🛑"},{"word":"Computer Store","emoji":"💻🖥️"},{"word":"Gas Station","emoji":"⛽🚗"},{"word":"Hospital","emoji":"🏥💊"},{"word":"Movie Theater","emoji":"🎬🍿"},{"word":"Music Store","emoji":"🎵🎸"},{"word":"Park","emoji":"🌳🌿"},{"word":"Pet Shop","emoji":"🐾🐕"}];
let sel=null,found=0,tries=0;
function init(){
  found=0;tries=0;sel=null;
  document.getElementById('found').textContent=0;
  document.getElementById('tries').textContent=0;
  document.getElementById('total').textContent=PAIRS.length;
  document.getElementById('cel').style.display='none';
  const lArr=[...PAIRS].sort(()=>Math.random()-.5);
  const rArr=[...PAIRS].sort(()=>Math.random()-.5);
  const lEl=document.getElementById('left');
  const rEl=document.getElementById('right');
  lEl.innerHTML=''; rEl.innerHTML='';
  lArr.forEach(p=>{
    const d=document.createElement('div');
    d.className='word-card'; d.textContent=p.word;
    d.dataset.key=p.word; d.dataset.side='left';
    d.onclick=()=>pick(d); lEl.appendChild(d);
  });
  rArr.forEach(p=>{
    const d=document.createElement('div');
    d.className='emoji-card';
    d.dataset.key=p.word; d.dataset.side='right';
    d.innerHTML=`<span class="em">${p.emoji}</span><span class="word-reveal">${p.word}</span>`;
    d.onclick=()=>pick(d); rEl.appendChild(d);
  });
}
function pick(el){
  if(el.classList.contains('matched')||el.classList.contains('wrong')) return;
  if(!sel){
    if(el.classList.contains('selected')){el.classList.remove('selected');sel=null;return;}
    document.querySelectorAll('.word-card.selected,.emoji-card.selected').forEach(x=>x.classList.remove('selected'));
    sel=el; el.classList.add('selected');
  } else {
    if(el===sel){sel=null;el.classList.remove('selected');return;}
    tries++;
    document.getElementById('tries').textContent=tries;
    if(sel.dataset.key===el.dataset.key && sel.dataset.side!==el.dataset.side){
      [sel,el].forEach(x=>{x.classList.remove('selected');x.classList.add('matched');});
      found++; document.getElementById('found').textContent=found;
      if(found===PAIRS.length) document.getElementById('cel').style.display='block';
    } else {
      sel.classList.add('wrong'); el.classList.add('wrong');
      setTimeout(()=>{ sel.classList.remove('selected','wrong'); el.classList.remove('wrong'); sel=null; },600);
      return;
    }
    sel=null;
  }
}
init();
</script></body></html>

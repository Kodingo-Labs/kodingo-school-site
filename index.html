<!-- ═══════════════════════════════════════════════════════════════
     BLOQUE 1: Preprocesamiento de PDFs (pdf.js)
════════════════════════════════════════════════════════════════ -->
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const OCR_FIXES = {
  'ATLETE':'ATHLETE','TAEATLCEHTEER':'TEACHER','TEATLCHER':'TEACHER',
  'ATLHETE':'ATHLETE','SHOPPPING':'SHOPPING','SHOPING':'SHOPPING',
};
const NOISE = new Set([
  'unit','unit4','unit5','vocabulary','grade','2nd','5th',
  'places','in','town','occupations','key','ring',
  'innova','schools','canva','my','best','city','ever',
  'vocabulary2ndgrade','vocabulary5thgrade',
]);
const TWO_WORD_PLACES = [
  'Movie Theater','Gas Station','Bus Stop','Train Station','Post Office',
  'Computer Store','Music Store','Pet Shop','Shopping Mall','Parking Lot',
  'Police Station','Fire Station','Town Hall','Swimming Pool','Food Court',
];
const TWO_WORD_IDX = {};
TWO_WORD_PLACES.forEach(p => TWO_WORD_IDX[p.toLowerCase()] = p);

const ACTION_MAP = {
  'movie':'Movie Theater → see a movie','gas':'Gas Station → put gas in the car',
  'fruits':'Supermarket → buy fruits','computer':'Computer Store → buy a computer',
  'bus':'Bus Stop → take the bus','book':'Bookstore → buy a book',
  'pizza':'Restaurant → eat a pizza','letter':'Post Office → mail a letter',
  'pet':'Pet Shop → buy pet food','bank':'Bank → get money',
  'park':'Park → play outside','hospital':'Hospital → see a doctor',
  'school':'School → study','music':'Music Store → buy music',
  'mall':'Shopping Mall → go shopping',
};

function fixOCR(t){ for(const[b,g] of Object.entries(OCR_FIXES)) t=t.replaceAll(b,g); return t; }
function isNoise(t){ return NOISE.has(t.toLowerCase().replace(/[.:,;0-9]/g,''))||t.trim().length<=1; }
function dedup(arr){ const s=new Set(); return arr.filter(x=>{const k=x.toLowerCase();if(s.has(k))return false;s.add(k);return true;}).sort(); }

function reconstructMultiword(tokens){
  const r=[]; let i=0;
  while(i<tokens.length){
    if(i+1<tokens.length){const bg=(tokens[i]+' '+tokens[i+1]).toLowerCase();if(TWO_WORD_IDX[bg]){r.push(TWO_WORD_IDX[bg]);i+=2;continue;}}
    r.push(tokens[i]); i++;
  }
  return dedup(r);
}

async function extractText(file){
  const ab=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:ab}).promise;
  const pages=[];
  for(let i=1;i<=pdf.numPages;i++){
    const p=await pdf.getPage(i);
    const c=await p.getTextContent();
    pages.push(fixOCR(c.items.map(x=>x.str).join(' ')));
  }
  return pages;
}

function parseVocabulary(pages){
  let inOcc=false; const pl=[],oc=[];
  for(const pg of pages){
    const up=pg.toUpperCase();
    if(up.includes('OCCUPATION')) inOcc=true;
    else if(up.includes('PLACES')||up.includes('TOWN')) inOcc=false;
    for(const raw of pg.split(/\s+/)){
      const w=fixOCR(raw.replace(/[.,;:]/g,''));
      if(w===w.toUpperCase()&&w.length>1&&!isNoise(w)&&/^[A-Z]/.test(w)){
        const t=w[0]+w.slice(1).toLowerCase();
        if(inOcc) oc.push(t); else pl.push(t);
      }
    }
  }
  return { places: reconstructMultiword(pl), occupations: dedup(oc) };
}

function parseKeyringActions(pages){
  const last=pages[pages.length-1].toLowerCase();
  const acts=[];
  for(const[kw,fmt] of Object.entries(ACTION_MAP))
    if(last.includes(kw)&&!acts.includes(fmt)) acts.push(fmt);
  if(!acts.length){
    const all=pages.join(' ').toLowerCase();
    for(const[kw,fmt] of Object.entries(ACTION_MAP))
      if(all.includes(kw)&&!acts.includes(fmt)) acts.push(fmt);
  }
  return acts;
}

function parseTemario(pages){
  const s=[];
  for(const pg of pages)
    for(const ln of pg.split(/[.!?]/)){
      const t=ln.trim();
      if(/SESSION\s+\d+/i.test(t)) s.push(t);
    }
  return s;
}

function generateMD(grado,unidad,unitName,places,actions,occupations,sessions){
  return [
    `# Unit ${unidad} — ${grado} Grado`,
    `**Nombre de la unidad:** ${unitName}`,''
    ,'## Places in Town',...places.map(p=>`- ${p}`),''
    ,'## Actions (place → action)',...actions.map(a=>`- ${a}`),''
    ,'## Occupations',...occupations.map(o=>`- ${o}`),''
    ,'## Grammar'
    ,'<!-- Editar si la gramática de la unidad cambia -->'
    ,'- Want to + verb (I want to eat ice cream)'
    ,'- Where is + place? (Where is the bank?)'
    ,'- There is / There are',''
    ,'## Sessions',...sessions.map(s=>`- ${s}`),''
  ].join('\n');
}

window.PREPROCESS = { extractText, parseVocabulary, parseKeyringActions, parseTemario, generateMD };
</script>

<script>
// ── Diccionarios de emojis y traducciones ────────────────────────
const PLACE_EMOJI = {
  'Movie Theater':'🎬','Gas Station':'⛽','Restaurant':'🍽️','Bus Stop':'🚌',
  'Train Station':'🚂','Post Office':'📮','Bookstore':'📚','Computer Store':'💻',
  'Bank':'🏦','Supermarket':'🛒','Music Store':'🎵','Shopping Mall':'🛍️',
  'Park':'🌳','Pet Shop':'🐾','Hospital':'🏥','School':'🏫',
  'Police Station':'🚔','Fire Station':'🚒','Town Hall':'🏛️',
  'Swimming Pool':'🏊','Parking Lot':'🅿️','Food Court':'🍜',
};
const PLACE_ES = {
  'Movie Theater':'Cine','Gas Station':'Grifo','Restaurant':'Restaurante',
  'Bus Stop':'Paradero','Train Station':'Estación de tren','Post Office':'Correos',
  'Bookstore':'Librería','Computer Store':'Tienda de cómputo','Bank':'Banco',
  'Supermarket':'Supermercado','Music Store':'Tienda de música',
  'Shopping Mall':'Centro comercial','Park':'Parque','Pet Shop':'Tienda de mascotas',
  'Hospital':'Hospital','School':'Colegio','Police Station':'Comisaría',
  'Fire Station':'Bomberos','Town Hall':'Municipio','Swimming Pool':'Piscina',
};
const OCC_EMOJI = {
  'Actor':'🎭','Artist':'🎨','Dancer':'💃','Doctor':'👨‍⚕️','Writer':'✍️',
  'Pilot':'✈️','Singer':'🎤','Athlete':'🏃','Teacher':'👩‍🏫','Chef':'👨‍🍳','Vet':'🐾',
};

function plEmoji(w){ return PLACE_EMOJI[w] || '🏙️'; }
function plEs(w){ return PLACE_ES[w] || w; }
function ocEmoji(w){ return OCC_EMOJI[w] || '👤'; }
function shuffle(a){ return [...a].sort(()=>Math.random()-0.5); }
function esc(s){ return s.replace(/'/g,"\\'"); }

// ── CSS base compartido ──────────────────────────────────────────
const BASE_CSS = `
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',Arial,sans-serif;background:#f0f4ff;min-height:100vh;padding:20px;color:#1e293b}
  h1{text-align:center;font-size:1.6rem;font-weight:800;color:#1e40af;margin-bottom:6px}
  .subtitle{text-align:center;color:#64748b;margin-bottom:28px;font-size:.9rem}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;transition:all .15s}
  button:hover{opacity:.88;transform:translateY(-1px)}
`;

// ════════════════════════════════════════════════════════════════
// 1. FLASHCARDS
// ════════════════════════════════════════════════════════════════
function generateFlashcards(vocab, grade, unitName){
  const is2do = grade==='2do';
  // Combinar lugares + profesiones
  const cards = [
    ...vocab.places.map(w=>({ word:w, emoji:plEmoji(w), back: is2do ? plEs(w) : `A place where you can ${(vocab.actions.find(a=>a.startsWith(w))||'').replace(/.*→\s*/,'') || 'go'}` })),
    ...(is2do ? [] : vocab.occupations.map(w=>({ word:w, emoji:ocEmoji(w), back:`A person who works as a ${w.toLowerCase()}` }))),
  ];
  const colors=['#fde68a','#bfdbfe','#bbf7d0','#fecaca','#ddd6fe','#fed7aa','#99f6e4','#e9d5ff'];
  const cardsJS = JSON.stringify(cards);

  return `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Flashcards — ${unitName}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
${BASE_CSS}
.container{max-width:480px;margin:0 auto}
.progress{text-align:center;color:#64748b;font-size:.9rem;margin-bottom:16px}
.scene{width:100%;height:280px;perspective:1000px;margin-bottom:20px;cursor:pointer}
.card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .5s}
.card.flipped{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;backface-visibility:hidden;box-shadow:0 8px 24px rgba(0,0,0,.12)}
.front{background:var(--c)}
.back{transform:rotateY(180deg);background:#1e40af;color:white}
.emoji{font-size:4rem;line-height:1}
.word{font-size:2rem;font-weight:800;text-align:center;padding:0 16px}
.hint{font-size:.85rem;color:#64748b;margin-top:-8px}
.back .word{font-size:1.8rem}
.back .hint{color:#bfdbfe}
.controls{display:flex;gap:10px;justify-content:center;margin-bottom:16px}
.btn{padding:10px 22px;font-size:1rem;background:#6366f1;color:white}
.btn-sec{background:#e2e8f0;color:#374151}
.btn-mix{background:#f59e0b;color:white}
</style></head><body>
<div class="container">
  <h1>🃏 Flashcards</h1>
  <p class="subtitle">${unitName} · ${grade} Grado · <span id="cnt"></span></p>
  <div class="progress">Tarjeta <span id="idx">1</span> de <span id="tot"></span> — clic para voltear</div>
  <div class="scene" onclick="flip()">
    <div class="card" id="card">
      <div class="face front" id="front"><div class="emoji" id="emoji"></div><div class="word" id="word"></div><div class="hint">clic para ver</div></div>
      <div class="face back"><div class="word" id="back"></div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn btn-sec" onclick="prev()">← Anterior</button>
    <button class="btn btn-mix" onclick="mix()">🔀 Mezclar</button>
    <button class="btn" onclick="next()">Siguiente →</button>
  </div>
</div>
<script>
const ALL=${cardsJS};
const COLORS=${JSON.stringify(colors)};
let cards=[...ALL],i=0,flipped=false;
function show(){
  const c=cards[i];
  document.getElementById('card').classList.remove('flipped');
  document.getElementById('front').style.setProperty('--c',COLORS[i%COLORS.length]);
  document.getElementById('emoji').textContent=c.emoji;
  document.getElementById('word').textContent=c.word;
  document.getElementById('back').textContent=c.back;
  document.getElementById('idx').textContent=i+1;
  document.getElementById('tot').textContent=cards.length;
  document.getElementById('cnt').textContent=cards.length+' palabras';
  flipped=false;
}
function flip(){ document.getElementById('card').classList.toggle('flipped'); flipped=!flipped; }
function next(){ i=(i+1)%cards.length; show(); }

// 2. MATCHING
// ════════════════════════════════════════════════════════════════
function generateMatching(vocab, grade, unitName){
  const is2do = grade==='2do';
  // Tomar hasta 10 pares para que sea manejable
  const pairs = is2do
    ? vocab.places.slice(0,10).map(w=>({ left:w, right:plEmoji(w) }))
    : vocab.places.slice(0,10).map(w=>({ left:plEs(w)+' / '+plEmoji(w), right:w }));

  return `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Matching — ${unitName}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
${BASE_CSS}
.container{max-width:640px;margin:0 auto}
.score{text-align:center;font-size:1rem;color:#64748b;margin-bottom:20px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.col{display:flex;flex-direction:column;gap:10px}
.item{padding:12px 16px;border-radius:12px;border:2.5px solid #e2e8f0;background:white;font-weight:700;font-size:1rem;cursor:pointer;text-align:center;transition:all .2s;user-select:none}
.item:hover{border-color:#6366f1;background:#eff6ff}
.item.selected{border-color:#6366f1;background:#eff6ff;transform:scale(1.03)}
.item.matched{border-color:#22c55e;background:#dcfce7;cursor:default;opacity:.7}
.item.wrong{border-color:#ef4444;background:#fee2e2;animation:shake .3s}
.right .item{font-size:1.6rem}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.btn{padding:10px 24px;font-size:1rem;background:#6366f1;color:white;display:block;margin:20px auto 0}
.celebrate{text-align:center;font-size:1.3rem;font-weight:800;color:#16a34a;margin-top:16px;display:none}
</style></head><body>
<div class="container">
  <h1>🔗 Matching</h1>
  <p class="subtitle">${unitName} · ${grade} Grado</p>
  <div class="score">Pares encontrados: <span id="found">0</span> / <span id="total">0</span> &nbsp;|&nbsp; Intentos: <span id="tries">0</span></div>
  <div class="grid">
    <div class="col" id="left"></div>
    <div class="col right" id="right"></div>
  </div>
  <div class="celebrate" id="cel">🎉 ¡Excelente! ¡Completaste el matching!</div>
  <button class="btn" onclick="init()">🔄 Reiniciar</button>
</div>
<script>
const PAIRS=${JSON.stringify(pairs)};
let sel=null,found=0,tries=0;
function init(){
  found=0;tries=0;sel=null;
  document.getElementById('found').textContent=0;
  document.getElementById('tries').textContent=0;
  document.getElementById('total').textContent=PAIRS.length;
  document.getElementById('cel').style.display='none';
  const lArr=[...PAIRS].sort(()=>Math.random()-.5);
  const rArr=[...PAIRS].sort(()=>Math.random()-.5);
  const lEl=document.getElementById('left');
  const rEl=document.getElementById('right');
  lEl.innerHTML=''; rEl.innerHTML='';
  lArr.forEach(p=>{const d=document.createElement('div');d.className='item';d.textContent=p.left;d.dataset.key=p.left;d.dataset.side='left';d.onclick=()=>pick(d);lEl.appendChild(d);});
  rArr.forEach(p=>{const d=document.createElement('div');d.className='item';d.textContent=p.right;d.dataset.key=p.left;d.dataset.side='right';d.onclick=()=>pick(d);rEl.appendChild(d);});
}
function pick(el){
  if(el.classList.contains('matched')||el.classList.contains('wrong')) return;
  if(!sel){
    if(el.classList.contains('selected')){el.classList.remove('selected');sel=null;return;}
    document.querySelectorAll('.item.selected').forEach(x=>x.classList.remove('selected'));
    sel=el; el.classList.add('selected');
  } else {
    if(el===sel){sel=null;el.classList.remove('selected');return;}
    tries++;
    document.getElementById('tries').textContent=tries;
    if(sel.dataset.key===el.dataset.key && sel.dataset.side!==el.dataset.side){
      sel.classList.replace('selected','matched');
      el.classList.add('matched');
      found++; document.getElementById('found').textContent=found;
      if(found===PAIRS.length){ document.getElementById('cel').style.display='block'; }
    } else {
      sel.classList.add('wrong'); el.classList.add('wrong');
      setTimeout(()=>{ sel.classList.remove('selected','wrong'); el.classList.remove('wrong'); sel=null; },600);
      return;
    }
    sel=null;
  }
}
init();
<\/script></body></html>`;
}

// 3. MINI HISTORIA
// ════════════════════════════════════════════════════════════════
function generateStory(vocab, grade, unitName){
  const is2do = grade==='2do';
  const places = vocab.places.slice(0,8);
  const actions = vocab.actions.slice(0,8);

  // Construir historia a partir del vocabulario real

  vocab.actions.forEach(a=>{ const[p,v]=a.split('→').map(s=>s.trim()); actionMap[p]=v; });

  let sentences = [];
  if(is2do){
    sentences = [
      `Hi! My name is Mateo. I live in a big city called Lima. 🌆`,
      `In my city, there is a <b>${places[0]||'Park'}</b> ${plEmoji(places[0]||'Park')} and a <b>${places[1]||'School'}</b> ${plEmoji(places[1]||'School')}.`,
      `I want to go to the <b>${places[2]||'Bookstore'}</b> ${plEmoji(places[2]||'Bookstore')} to ${actionMap[places[2]]||'buy a book'}.`,
      `My mom wants to go to the <b>${places[3]||'Supermarket'}</b> ${plEmoji(places[3]||'Supermarket')} to ${actionMap[places[3]]||'buy fruits'}.`,
      `My dad wants to go to the <b>${places[4]||'Gas Station'}</b> ${plEmoji(places[4]||'Gas Station')} to ${actionMap[places[4]]||'put gas in the car'}.`,
      `After that, we all want to go to the <b>${places[5]||'Restaurant'}</b> ${plEmoji(places[5]||'Restaurant')} to ${actionMap[places[5]]||'eat a pizza'}. 🎉`,
      `I love my city! There are many places to visit. What is your favorite place? 🤔`,
    ];
  } else {
    sentences = [
      `<b>Ana:</b> "Hey Carlos! What are you doing this weekend?"`,
      `<b>Carlos:</b> "I'm planning to visit different places in the city. First, I want to go to the <b>${places[0]||'Museum'}</b> ${plEmoji(places[0]||'Museum')}."`,
      `<b>Ana:</b> "That sounds great! There is also a new <b>${places[1]||'Music Store'}</b> ${plEmoji(places[1]||'Music Store')} downtown. We can go together."`,
      `<b>Carlos:</b> "Perfect! After that, we could stop at the <b>${places[2]||'Restaurant'}</b> ${plEmoji(places[2]||'Restaurant')}. I want to ${actionMap[places[2]]||'have lunch'}."`,
      `<b>Ana:</b> "Sure! And maybe we can visit the <b>${places[3]||'Bookstore'}</b> ${plEmoji(places[3]||'Bookstore')}. I need to ${actionMap[places[3]]||'buy some books'} for school."`,
      `<b>Carlos:</b> "Don't forget we have to stop at the <b>${places[4]||'Bank'}</b> ${plEmoji(places[4]||'Bank')} too. I need to ${actionMap[places[4]]||'get some money'}."`,
      `<b>Ana:</b> "Great plan! Our city has so many interesting places. Let's meet at the <b>${places[5]||'Bus Stop'}</b> ${plEmoji(places[5]||'Bus Stop')} at 10 am."`,
      `<b>Carlos:</b> "See you there! It's going to be a fantastic day in the city! 😄"`,
    ];
  }

  const vocabSet = new Set([...vocab.places, ...vocab.occupations]);

  return `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Story — ${unitName}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
${BASE_CSS}
.container{max-width:600px;margin:0 auto}
.story{background:white;border-radius:20px;padding:28px;box-shadow:0 4px 20px rgba(0,0,0,.08);line-height:2;font-size:${is2do?'1.15rem':'1rem'}}
.story p{margin-bottom:14px}
b{color:#1e40af;background:#dbeafe;padding:1px 4px;border-radius:4px;cursor:pointer;position:relative}
b:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:4px 10px;border-radius:8px;font-size:.78rem;white-space:nowrap;z-index:10;font-weight:400}
.vocab-box{background:white;border-radius:16px;padding:20px;margin-top:20px;box-shadow:0 2px 12px rgba(0,0,0,.07)}
.vocab-box h3{font-weight:800;margin-bottom:12px;color:#374151}
.chips{display:flex;flex-wrap:wrap;gap:8px}

</style></head><body>
<div class="container">

<\/body><\/html>`;

// 4. JUEGO INTERACTIVO
// 2do grado: Memorama (memory game)
// 5to grado: Quiz de selección múltiple
// ════════════════════════════════════════════════════════════════
function generateGame(vocab, grade, unitName){
  const is2do = grade==='2do';
  return is2do ? generateMemory(vocab, unitName) : generateQuiz(vocab, unitName);
}

function generateMemory(vocab, unitName){
  const places = vocab.places.slice(0,8); // 8 pares = 16 cartas
  const pairs = places.map(w=>({ word:w, emoji:plEmoji(w) }));

  return `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Memorama — ${unitName}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
${BASE_CSS}
.container{max-width:520px;margin:0 auto}
.stats{display:flex;justify-content:center;gap:24px;margin-bottom:16px;font-weight:700;color:#374151}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.card{height:90px;cursor:pointer;border-radius:12px;position:relative;transform-style:preserve-3d;transition:transform .4s}
.card.flipped,.card.matched{transform:rotateY(180deg)}
.face{position:absolute;inset:0;border-radius:12px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;font-weight:800}
.back-face{background:#6366f1;font-size:1.8rem;color:white}
.front-face{transform:rotateY(180deg);background:white;border:2.5px solid #e2e8f0;font-size:.72rem;text-align:center;padding:4px;flex-direction:column;gap:2px}
.front-face .em{font-size:1.4rem}
.card.matched .front-face{border-color:#22c55e;background:#dcfce7}
.btn{padding:10px 24px;font-size:1rem;background:#6366f1;color:white;display:block;margin:16px auto 0}
.win{text-align:center;font-size:1.2rem;font-weight:800;color:#16a34a;margin-top:12px;display:none}
</style></head><body>
<div class="container">
  <h1>🎮 Memorama</h1>
  <p class="subtitle">${unitName} · 2do Grado</p>
  <div class="stats"><span>Pares: <span id="found">0</span>/${pairs.length}</span><span>Intentos: <span id="tries">0</span></span><span>⏱ <span id="timer">0s</span></span></div>
  <div class="grid" id="grid"></div>
  <div class="win" id="win">🎉 ¡Ganaste! Completaste el memorama.</div>
  <button class="btn" onclick="init()">🔄 Nuevo juego</button>
</div>
<script>
const PAIRS=${JSON.stringify(pairs)};
let open=[],matched=0,tries=0,lock=false,t=0,timer=null;
function init(){
  open=[];matched=0;tries=0;lock=false;t=0;
  clearInterval(timer);
  document.getElementById('found').textContent=0;
  document.getElementById('tries').textContent=0;
  document.getElementById('timer').textContent='0s';
  document.getElementById('win').style.display='none';
  const cards=[...PAIRS.map(p=>({...p,type:'word'})),...PAIRS.map(p=>({...p,type:'emoji'}))].sort(()=>Math.random()-.5);
  const g=document.getElementById('grid'); g.innerHTML='';
  cards.forEach((c,i)=>{
    const d=document.createElement('div'); d.className='card'; d.dataset.idx=i; d.dataset.key=c.word; d.dataset.type=c.type;
    d.innerHTML=\`<div class="face back-face">❓</div><div class="face front-face"><span class="em">\${c.type==='emoji'?c.emoji:'🏙️'}</span>\${c.type==='word'?c.word:''}</div>\`;
    d.onclick=()=>flip(d); g.appendChild(d);
  });
  timer=setInterval(()=>{ t++; document.getElementById('timer').textContent=t+'s'; },1000);
}
function flip(d){
  if(lock||d.classList.contains('flipped')||d.classList.contains('matched')) return;
  d.classList.add('flipped'); open.push(d);
  if(open.length===2){
    lock=true; tries++;
    document.getElementById('tries').textContent=tries;
    if(open[0].dataset.key===open[1].dataset.key && open[0].dataset.type!==open[1].dataset.type){
      open.forEach(x=>x.classList.add('matched'));
      matched++; document.getElementById('found').textContent=matched;
      open=[]; lock=false;
      if(matched===PAIRS.length){ clearInterval(timer); document.getElementById('win').style.display='block'; }
    } else {
      setTimeout(()=>{ open.forEach(x=>x.classList.remove('flipped')); open=[]; lock=false; },900);
    }
  }
}
init();
<\/script></body></html>`;
}

function generateQuiz(vocab, unitName){
  // Generar preguntas: definición → lugar o lugar → acción
  const questions = [];
  vocab.places.forEach(place => {
    const wrong = vocab.places.filter(p=>p!==place).sort(()=>Math.random()-.5).slice(0,3);
    questions.push({
      q: `Which place has the emoji ${plEmoji(place)}?`,
      correct: place,
      options: shuffle([place,...wrong]),
    });
  });
  vocab.actions.slice(0,6).forEach(action => {
    const[place,act] = action.split('→').map(s=>s.trim());
    const wrong = vocab.places.filter(p=>p!==place).sort(()=>Math.random()-.5).slice(0,3);
    questions.push({
      q: `Where do you go to ${act}?`,
      correct: place,
      options: shuffle([place,...wrong]),
    });
  });
  const qs = shuffle(questions).slice(0,10);

  return `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Quiz — ${unitName}</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
${BASE_CSS}
.container{max-width:560px;margin:0 auto}
.progress-bar{background:#e2e8f0;border-radius:99px;height:10px;margin-bottom:6px}
.progress-fill{background:linear-gradient(90deg,#6366f1,#3b82f6);height:100%;border-radius:99px;transition:width .4s}
.prog-label{font-size:.85rem;color:#64748b;margin-bottom:20px;text-align:right}
.question{background:white;border-radius:16px;padding:24px;box-shadow:0 4px 16px rgba(0,0,0,.08);margin-bottom:16px}
.q-text{font-size:1.15rem;font-weight:700;margin-bottom:18px;line-height:1.5}
.options{display:flex;flex-direction:column;gap:10px}
.opt{padding:12px 16px;border-radius:10px;border:2.5px solid #e2e8f0;background:white;font-size:1rem;font-weight:700;text-align:left;cursor:pointer}
.opt:hover{border-color:#6366f1;background:#eff6ff}
.opt.correct{border-color:#22c55e;background:#dcfce7;color:#15803d}
.opt.wrong{border-color:#ef4444;background:#fee2e2;color:#dc2626}
.feedback{font-size:1rem;font-weight:800;margin-top:14px;min-height:24px}
.score-box{background:white;border-radius:20px;padding:32px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.score-box h2{font-size:2rem;font-weight:800;margin-bottom:8px}
.btn{padding:10px 24px;font-size:1rem;background:#6366f1;color:white;margin-top:16px}
</style></head><body>
<div class="container">
  <h1>🎮 Quiz</h1>
  <p class="subtitle">${unitName} · 5to Grado</p>
  <div id="quiz"></div>
</div>
<script>
const QS=${JSON.stringify(qs)};
let cur=0,score=0,answered=false;
function render(){
  const el=document.getElementById('quiz');
  if(cur>=QS.length){ el.innerHTML=\`<div class="score-box"><div style="font-size:3rem">\${score>=8?'🏆':score>=5?'👍':'💪'}</div><h2>\${score}/\${QS.length}</h2><p style="color:#64748b">\${score>=8?'Excellent!':score>=5?'Good job!':'Keep practicing!'}</p><button class="btn" onclick="restart()">🔄 Try again</button></div>\`; return; }
  const q=QS[cur];
  el.innerHTML=\`
    <div class="progress-bar"><div class="progress-fill" style="width:\${(cur/QS.length)*100}%"></div></div>
    <div class="prog-label">Question \${cur+1} of \${QS.length} · Score: \${score}</div>
    <div class="question">
      <div class="q-text">\${q.q}</div>
      <div class="options">\${q.options.map(o=>\`<button class="opt" onclick="pick(this,'\${o.replace(/'/g,"\\'")}','\${q.correct.replace(/'/g,"\\'")}')">\\${o}</button>\`).join('')}</div>
      <div class="feedback" id="fb"></div>
    </div>\`;
}
function pick(btn,chosen,correct){
  if(answered) return; answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.style.cursor='default');
  if(chosen===correct){ btn.classList.add('correct'); score++; document.getElementById('fb').textContent='✅ Correct!'; document.getElementById('fb').style.color='#16a34a'; }
  else { btn.classList.add('wrong'); document.querySelectorAll('.opt').forEach(b=>{ if(b.textContent.trim()===correct) b.classList.add('correct'); }); document.getElementById('fb').textContent='❌ The answer is: '+correct; document.getElementById('fb').style.color='#dc2626'; }
  setTimeout(()=>{ cur++; answered=false; render(); },1400);
}
function restart(){ cur=0; score=0; answered=false; render(); }
render();
<\/script></body></html>`;
}

window.GENERATORS = { generateFlashcards, generateMatching, generateStory, generateGame };
</script>

     BLOQUE 3: React App

<script type="text/babel">
const { useState, useRef } = React;

const PDF_CONFIG = {
  '2do': ['vocab','keyring','temario'],
  '5to': ['vocab','temario'],
};
const ALL_PDF_TYPES = {
  vocab:   { id:'vocab',   label:'Vocabulario principal', file:'Vocabulary - Unit X.pdf',            hint:'Lista de lugares, profesiones y fotos reales.',                                              emoji:'📘', color:'#3b82f6', bg:'#eff6ff', border:'#93c5fd' },
  keyring: { id:'keyring', label:'Vocabulario key ring',  file:'VOCABULARY - key ring - [...].pdf',  hint:'Flashcards en grilla. Última página: acciones (ej: Bookstore → buy a book).',              emoji:'🔑', color:'#8b5cf6', bg:'#f5f3ff', border:'#c4b5fd' },
  temario: { id:'temario', label:'Temario',               file:'TEMARIO - UNIT X.pdf',               hint:'Sesiones y objetivos de aprendizaje.',                                                       emoji:'📋', color:'#10b981', bg:'#f0fdf4', border:'#86efac' },
};
const MATERIAL_TYPES = [
  { id:'flashcards', label:'Flashcards',       emoji:'🃏', fn:'generateFlashcards' },
  { id:'matching',   label:'Matching',          emoji:'🔗', fn:'generateMatching'   },
  { id:'story',      label:'Mini historia',     emoji:'📖', fn:'generateStory'      },
  { id:'game',       label:'Juego interactivo', emoji:'🎮', fn:'generateGame'       },
];
const AVAILABLE_UNITS = [
  // { slug:'unit4', name:'Unit 4 — My Best City Ever', grade:'2do' },
];

const lbl = { display:'block', fontWeight:700, marginBottom:7, color:'#374151', fontSize:'0.9rem' };
const inp = { width:'100%', padding:'10px 12px', borderRadius:10, border:'2px solid #e2e8f0', fontSize:'0.95rem', fontFamily:'inherit', outline:'none' };
function btn(bg,color='white',extra={}){ return { background:bg,color,border:'none',borderRadius:8,padding:'8px 16px',cursor:'pointer',fontWeight:700,fontSize:'0.875rem',fontFamily:'inherit',...extra }; }
function card(extra={}){ return { background:'white', borderRadius:16, boxShadow:'0 2px 12px rgba(0,0,0,0.07)', ...extra }; }

function PDFInput({ type, file, onChange, disabled }) {
  const ref = useRef();
  return (
    <div style={{ border:`2px solid ${file?type.border:'#e2e8f0'}`, borderRadius:12, background:file?type.bg:'#f8fafc', padding:14, transition:'all .2s' }}>
      <div style={{ display:'flex', gap:10, alignItems:'flex-start', marginBottom:8 }}>
        <span style={{ fontSize:'1.4rem', lineHeight:1 }}>{type.emoji}</span>
        <div style={{ flex:1 }}>
          <div style={{ fontWeight:800, color:type.color, fontSize:'0.95rem' }}>{type.label}</div>
          <div style={{ fontSize:'0.72rem', color:'#94a3b8', fontStyle:'italic', marginTop:2 }}>{type.file}</div>
          <div style={{ fontSize:'0.78rem', color:'#64748b', marginTop:4 }}>{type.hint}</div>
        </div>
      </div>
      <input ref={ref} type="file" accept=".pdf" disabled={disabled} onChange={e=>onChange(e.target.files[0])} style={{ display:'none' }} />
      <button onClick={()=>ref.current.click()} disabled={disabled}
        style={{ ...btn(file?type.color:'#94a3b8'), width:'100%', padding:'8px', opacity:disabled?.5:1 }}>
        {file ? `✓ ${file.name}` : '+ Adjuntar PDF'}
      </button>
    </div>
  );
}

function MaterialCard({ mat, html, unitName, grade, unidad }) {
  const filename = `unit${unidad}_${grade}_${mat.id}.html`;
  function download() {
    const blob = new Blob([html], { type:'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=filename; a.click();
    URL.revokeObjectURL(url);
  }
  function preview() {
    const w = window.open('','_blank'); w.document.write(html); w.document.close();
  }
  return (
    <div style={{ display:'flex', alignItems:'center', gap:14, padding:'14px 16px', borderRadius:12, border:'2px solid #86efac', background:'#f0fdf4' }}>
      <span style={{ fontSize:'1.8rem' }}>{mat.emoji}</span>
      <div style={{ flex:1 }}>
        <div style={{ fontWeight:800 }}>{mat.label}</div>
        <div style={{ fontSize:'0.75rem', color:'#64748b', marginTop:2 }}>{filename}</div>
      </div>
      <button onClick={preview} style={btn('#3b82f6')}>Ver</button>
      <button onClick={download} style={btn('#10b981')}>↓ Guardar</button>
    </div>
  );
}

function App() {
  const [grade,    setGrade]    = useState('2do');
  const [unidad,   setUnidad]   = useState('');
  const [unitName, setUnitName] = useState('');
  const [files,    setFiles]    = useState({});
  const [status,   setStatus]   = useState('idle');
  const [vocab,    setVocab]    = useState(null);
  const [htmls,    setHtmls]    = useState({});
  const [errMsg,   setErrMsg]   = useState('');

  const requiredPdfs = PDF_CONFIG[grade] || [];
  const pdfTypes = requiredPdfs.map(id => ALL_PDF_TYPES[id]);
  const allReady = unidad && requiredPdfs.every(id => files[id]);
  const unitLabel = unitName || `Unit ${unidad}`;

  async function process() {
    if (!allReady) return;
    setStatus('processing'); setVocab(null); setHtmls({}); setErrMsg('');
    try {
      const [vocabPages, temarioPages] = await Promise.all([
        window.PREPROCESS.extractText(files.vocab),
        window.PREPROCESS.extractText(files.temario),
      ]);
      const keyringPages = files.keyring ? await window.PREPROCESS.extractText(files.keyring) : [];
      const { places, occupations } = window.PREPROCESS.parseVocabulary(vocabPages);
      const actions  = files.keyring ? window.PREPROCESS.parseKeyringActions(keyringPages) : [];
      const sessions = window.PREPROCESS.parseTemario(temarioPages);
      const v = { places, occupations, actions, sessions };
      setVocab(v);

      // Generar los 4 HTMLs
      const G = window.GENERATORS;
      const generated = {
        flashcards: G.generateFlashcards(v, grade, unitLabel),
        matching:   G.generateMatching(v, grade, unitLabel),
        story:      G.generateStory(v, grade, unitLabel),
        game:       G.generateGame(v, grade, unitLabel),
      };
      setHtmls(generated);
      setStatus('done');
    } catch(e) {
      setErrMsg(e.message || 'Error procesando los PDFs.');
      setStatus('error');
    }
  }

  function downloadMD() {
    if (!vocab) return;
    const md = window.PREPROCESS.generateMD(grade, unidad, unitLabel, vocab.places, vocab.actions, vocab.occupations, vocab.sessions);
    const blob = new Blob([md], { type:'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download=`unit${unidad}_${grade}_vocabulario.md`; a.click();
    URL.revokeObjectURL(url);
  }

  return (
    <div style={{ maxWidth:680, margin:'0 auto', padding:'40px 20px' }}>
      {/* Header */}
      <div style={{ textAlign:'center', marginBottom:32 }}>
        <div style={{ fontSize:'3rem', marginBottom:8 }}>🏫</div>
        <h1 style={{ fontSize:'1.6rem', fontWeight:800, color:'#1e40af' }}>Inglés Innova Schools</h1>
        <p style={{ color:'#64748b', marginTop:6 }}>Genera material de repaso a partir de los PDFs del colegio</p>
      </div>

      {/* Materiales disponibles */}
      {AVAILABLE_UNITS.length > 0 && (
        <div style={{ ...card(), padding:20, marginBottom:24 }}>
          <h2 style={{ fontWeight:800, fontSize:'1rem', marginBottom:12 }}>📚 Materiales guardados</h2>
          {AVAILABLE_UNITS.map(u => (
            <div key={u.slug+u.grade} style={{ padding:'10px 14px', borderRadius:10, border:'1px solid #e2e8f0', marginBottom:8 }}>
              <span style={{ fontWeight:700 }}>{u.grade==='2do'?'🐣':'🎓'} {u.name} — {u.grade}</span>
            </div>
          ))}
        </div>
      )}

      {/* Formulario */}
      <div style={{ ...card(), padding:26, marginBottom:24 }}>
        <h2 style={{ fontWeight:800, fontSize:'1.1rem', marginBottom:20 }}>⚙️ Procesar nueva unidad</h2>

        {/* Grado */}
        <label style={lbl}>Grado</label>
        <div style={{ display:'flex', gap:10, marginBottom:18 }}>
          {[['2do','🐣','Principiante'],['5to','🎓','Intermedio']].map(([g,em,lvl]) => (
            <button key={g} onClick={()=>{ setGrade(g); setFiles({}); setStatus('idle'); setVocab(null); setHtmls({}); }} style={{
              flex:1, padding:'10px', borderRadius:10, border:'2px solid',
              borderColor:grade===g?'#3b82f6':'#e2e8f0',
              background:grade===g?'#eff6ff':'white',
              color:grade===g?'#1d4ed8':'#64748b',
              fontWeight:800, cursor:'pointer', fontFamily:'inherit',
            }}>{em} {g} Grado <span style={{ fontSize:'0.72rem', opacity:.7 }}>· {lvl}</span></button>
          ))}
        </div>

        {/* Nº y nombre (opcional) */}
        <div style={{ display:'flex', gap:12, marginBottom:20 }}>
          <div style={{ width:120 }}>
            <label style={lbl}>Nº unidad</label>
            <input type="number" min="1" max="10" value={unidad} onChange={e=>setUnidad(e.target.value)} placeholder="4" style={inp} />
          </div>
          <div style={{ flex:1 }}>
            <label style={lbl}>Nombre <span style={{ fontWeight:400, color:'#94a3b8' }}>(opcional)</span></label>
            <input type="text" value={unitName} onChange={e=>setUnitName(e.target.value)} placeholder="My Best City Ever" style={inp} />
          </div>
        </div>

        {/* PDFs */}
        <label style={lbl}>
          PDFs del colegio
          <span style={{ fontWeight:400, color:'#94a3b8', marginLeft:8, fontSize:'0.8rem' }}>
            ({pdfTypes.length} para {grade} grado)
          </span>
        </label>
        <div style={{ display:'flex', flexDirection:'column', gap:12, marginBottom:22 }}>
          {pdfTypes.map(pt => (
            <PDFInput key={pt.id} type={pt} file={files[pt.id]}
              onChange={f=>setFiles(prev=>({...prev,[pt.id]:f}))}
              disabled={status==='processing'} />
          ))}
        </div>

        {errMsg && (
          <div style={{ background:'#fee2e2', color:'#dc2626', borderRadius:10, padding:'10px 14px', marginBottom:16, fontSize:'0.9rem' }}>⚠️ {errMsg}</div>
        )}

        <button onClick={process} disabled={!allReady||status==='processing'} style={{
          width:'100%', padding:14, borderRadius:12, border:'none',
          background: allReady&&status!=='processing' ? 'linear-gradient(135deg,#6366f1,#3b82f6)' : '#cbd5e1',
          color:'white', fontWeight:800, fontSize:'1.05rem',
          cursor:allReady&&status!=='processing'?'pointer':'not-allowed',
          fontFamily:'inherit',
          boxShadow: allReady ? '0 4px 12px rgba(99,102,241,.35)' : 'none',
        }}>
          {status==='processing' ? '⏳ Procesando PDFs y generando material…' : '✨ Extraer vocabulario y generar material'}
        </button>
        {!allReady && status==='idle' && (
          <p style={{ textAlign:'center', color:'#94a3b8', fontSize:'0.82rem', marginTop:10 }}>
            Completa el número de unidad y adjunta los {pdfTypes.length} PDFs para continuar.
          </p>
        )}
      </div>

      {/* Resultados */}
      {status==='done' && vocab && (
        <div style={{ ...card(), padding:24 }}>
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:16 }}>
            <h2 style={{ fontWeight:800, fontSize:'1.1rem' }}>✅ Material generado</h2>
            <button onClick={downloadMD} style={btn('#64748b','white',{ fontSize:'0.8rem' })}>↓ .md</button>
          </div>

          {/* Resumen de vocabulario */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:10, marginBottom:16 }}>
            {[['📍','Lugares',vocab.places],['💼','Profesiones',vocab.occupations]].map(([em,title,items])=>(
              <div key={title} style={{ background:'#f8fafc', borderRadius:10, padding:12 }}>
                <div style={{ fontWeight:700, fontSize:'0.85rem', marginBottom:6 }}>{em} {title} ({items.length})</div>
                <div style={{ display:'flex', flexWrap:'wrap', gap:4 }}>
                  {items.map(w=><span key={w} style={{ background:'white', border:'1px solid #e2e8f0', borderRadius:6, padding:'2px 7px', fontSize:'0.72rem', fontWeight:600 }}>{w}</span>)}
                </div>
              </div>
            ))}
          </div>

          {/* 4 materiales */}
          <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
            {MATERIAL_TYPES.map(mat => (
              <MaterialCard key={mat.id} mat={mat} html={htmls[mat.id]||''} unitName={unitLabel} grade={grade} unidad={unidad} />
            ))}
          </div>
        </div>
      )}

      <div style={{ textAlign:'center', color:'#94a3b8', fontSize:'0.8rem', marginTop:28 }}>
        Innova Schools · Inglés Primaria · {new Date().getFullYear()}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English — Innova Schools</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      background: linear-gradient(160deg, #e0e7ff 0%, #f0fdf4 100%);
      color: #1e293b;
      padding: 32px 20px 60px;
    }

    .header { text-align: center; margin-bottom: 40px; }
    .header .crown { font-size: 3.5rem; display: block; margin-bottom: 8px; }
    .header h1 { font-size: 2rem; font-weight: 900; color: #1e40af; }
    .header p { color: #64748b; margin-top: 6px; font-size: 1rem; }

    /* Selector de hijo */
    .kids { display: flex; gap: 14px; justify-content: center; margin-bottom: 36px; flex-wrap: wrap; }
    .kid-btn {
      padding: 12px 28px; border-radius: 99px; border: 3px solid transparent;
      font-family: inherit; font-size: 1rem; font-weight: 800; cursor: pointer;
      transition: all .2s; background: white;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }
    .kid-btn.active { border-color: #6366f1; background: #eff6ff; color: #1d4ed8; transform: scale(1.05); }
    .kid-btn:not(.active) { color: #64748b; }
    .kid-btn:not(.active):hover { border-color: #e2e8f0; background: #f8fafc; }

    /* Unidades */
    .section-title {
      font-size: 1.1rem; font-weight: 800; color: #374151;
      margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
    }
    .units { display: flex; flex-direction: column; gap: 16px; max-width: 640px; margin: 0 auto; }

    .unit-card {
      background: white; border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.08); overflow: hidden;
    }
    .unit-header {
      padding: 18px 22px; display: flex; align-items: center; gap: 14px;
      cursor: pointer; user-select: none;
    }
    .unit-icon { font-size: 2.2rem; }
    .unit-info { flex: 1; }
    .unit-name { font-size: 1.05rem; font-weight: 800; }
    .unit-meta { font-size: 0.78rem; color: #94a3b8; margin-top: 2px; }
    .unit-badge {
      background: #dcfce7; color: #16a34a;
      font-size: 0.72rem; font-weight: 800;
      padding: 3px 10px; border-radius: 99px;
    }
    .chevron { color: #94a3b8; font-size: 1.1rem; transition: transform .2s; }
    .chevron.open { transform: rotate(90deg); }

    .unit-materials {
      border-top: 1px solid #f1f5f9;
      padding: 14px 18px;
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .mat-link {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 12px;
      border: 2px solid #e2e8f0; background: #f8fafc;
      text-decoration: none; color: #1e293b;
      font-weight: 700; font-size: 0.9rem;
      transition: all .15s;
    }
    .mat-link:hover { border-color: #6366f1; background: #eff6ff; transform: translateY(-2px); }
    .mat-emoji { font-size: 1.5rem; }

    /* Estado vacío */
    .empty {
      text-align: center; padding: 48px 20px;
      background: white; border-radius: 20px;
      box-shadow: 0 4px 16px rgba(0,0,0,.07);
      max-width: 640px; margin: 0 auto; color: #94a3b8;
    }
    .empty .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty p { font-size: 0.95rem; line-height: 1.6; }

    /* Footer */
    footer { text-align: center; margin-top: 48px; color: #94a3b8; font-size: 0.8rem; }
  </style>
</head>
<body>

<div class="header">
  <span class="crown">📚</span>
  <h1>My English Practice</h1>
  <p>Innova Schools · Choose your materials below</p>
</div>

<!-- Selector de hijo -->
<div class="kids">
  <button class="kid-btn active" onclick="setKid('2do', this)">🐣 2do Grado</button>
  <button class="kid-btn" onclick="setKid('5to', this)">🎓 5to Grado</button>
</div>

<!-- Contenido por grado -->
<div id="content-2do">
  <div class="units" id="units-2do"></div>
</div>
<div id="content-5to" style="display:none">
  <div class="units" id="units-5to"></div>
</div>

<footer>
  Innova Schools · English Practice · <span id="year"></span>
</footer>

<script>
// ═══════════════════════════════════════════════════════════════
// CONFIGURACIÓN — agregar aquí cada unidad nueva que se genere
// ═══════════════════════════════════════════════════════════════
const UNITS = [
  {
    grade:  '2do',
    unit:   4,
    name:   'My Best City Ever',
    emoji:  '🏙️',
  },
  // Ejemplo de cómo agregar más unidades:
  // { grade: '2do', unit: 5, name: 'My Family', emoji: '👨‍👩‍👧‍👦' },
  // { grade: '5to', unit: 4, name: 'My Best City Ever', emoji: '🏙️' },
];

const MATERIALS = [
  { id: 'flashcards', label: 'Flashcards',  emoji: '🃏' },
  { id: 'matching',   label: 'Matching',    emoji: '🔗' },
  { id: 'story',      label: 'Story',       emoji: '📖' },
  { id: 'game',       label: 'Game',        emoji: '🎮' },
];

// ─── Render ─────────────────────────────────────────────────────

function matPath(unit, mat) {
  const slug = `unit${unit.unit}_${unit.grade}`;
  return `generado/${unit.grade}/unit${unit.unit}/${slug}_${mat.id}.html`;
}

function renderUnits(grade) {
  const container = document.getElementById(`units-${grade}`);
  const gradeUnits = UNITS.filter(u => u.grade === grade);

  if (gradeUnits.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="icon">📭</div>
        <p>No materials yet for this grade.<br>Check back after the next unit is processed!</p>
      </div>`;
    return;
  }

  container.innerHTML = gradeUnits.map((unit, idx) => `
    <div class="unit-card">
      <div class="unit-header" onclick="toggle('panel-${grade}-${idx}', this)">
        <span class="unit-icon">${unit.emoji}</span>
        <div class="unit-info">
          <div class="unit-name">Unit ${unit.unit} — ${unit.name}</div>
          <div class="unit-meta">${grade} Grado · ${MATERIALS.length} activities</div>
        </div>
        <span class="unit-badge">✓ Ready</span>
        <span class="chevron" id="chev-${grade}-${idx}">›</span>
      </div>
      <div class="unit-materials" id="panel-${grade}-${idx}" style="display:none">
        ${MATERIALS.map(mat => `
          <a class="mat-link" href="${matPath(unit, mat)}" target="_blank">
            <span class="mat-emoji">${mat.emoji}</span>
            ${mat.label}
          </a>`).join('')}
      </div>
    </div>`).join('');
}

function toggle(panelId, header) {
  const panel = document.getElementById(panelId);
  const chevId = panelId.replace('panel-', 'chev-');
  const chev   = document.getElementById(chevId);
  const open   = panel.style.display !== 'none';
  panel.style.display = open ? 'none' : 'grid';
  chev.classList.toggle('open', !open);
}

function setKid(grade, btn) {
  document.querySelectorAll('.kid-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('content-2do').style.display = grade === '2do' ? '' : 'none';
  document.getElementById('content-5to').style.display = grade === '5to' ? '' : 'none';
}

// ─── Init ────────────────────────────────────────────────────────
document.getElementById('year').textContent = new Date().getFullYear();
renderUnits('2do');
renderUnits('5to');
</script>
</body>
</html>

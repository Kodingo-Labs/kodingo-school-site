<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Word Scramble — The Best City Ever</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>

  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Nunito',Arial,sans-serif;background:#f0f4ff;min-height:100vh;padding:20px;color:#1e293b}
  h1{text-align:center;font-size:1.6rem;font-weight:800;color:#1e40af;margin-bottom:6px}
  .subtitle{text-align:center;color:#64748b;margin-bottom:28px;font-size:.9rem}
  button{font-family:inherit;cursor:pointer;border:none;border-radius:10px;font-weight:700;transition:all .15s}
  button:hover{opacity:.88;transform:translateY(-1px)}

.container{max-width:480px;margin:0 auto}
.progress-bar{height:10px;background:#e2e8f0;border-radius:99px;overflow:hidden;margin-bottom:22px}
.progress-fill{height:100%;background:linear-gradient(90deg,#6366f1,#818cf8);border-radius:99px;transition:width .4s}
.emoji-box{font-size:6rem;text-align:center;margin:10px 0 6px;line-height:1;filter:drop-shadow(0 4px 12px rgba(0,0,0,.12))}
.word-hint{text-align:center;color:#94a3b8;font-size:.85rem;font-weight:700;margin-bottom:18px;letter-spacing:.05em}
.answer-row{display:flex;justify-content:center;gap:8px;min-height:60px;margin-bottom:22px;flex-wrap:wrap}
.answer-box{
  width:46px;height:54px;border-radius:10px;border:3px solid #cbd5e1;background:white;
  display:flex;align-items:center;justify-content:center;
  font-size:1.35rem;font-weight:900;color:#1e293b;cursor:pointer;
  transition:all .15s;
}
.answer-box.filled{border-color:#6366f1;background:#eff6ff;color:#4338ca}
.answer-box.filled:hover{border-color:#4338ca;background:#e0e7ff}
.answer-box.correct{border-color:#22c55e!important;background:#dcfce7!important;color:#15803d!important;animation:pop .3s}
.answer-box.wrong{animation:shake .35s}
@keyframes pop{0%{transform:scale(.85)}60%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.letters-row{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin-bottom:18px}
.letter-tile{
  width:46px;height:54px;border-radius:10px;border:none;
  background:#6366f1;color:white;font-size:1.35rem;font-weight:900;
  cursor:pointer;font-family:inherit;
  transition:all .15s;box-shadow:0 3px 8px rgba(99,102,241,.35);
}
.letter-tile:hover:not(:disabled){background:#4f46e5;transform:translateY(-2px);box-shadow:0 5px 14px rgba(99,102,241,.4)}
.letter-tile:disabled{opacity:0;pointer-events:none}
.controls{display:flex;justify-content:center;gap:10px}
.btn-back{padding:9px 20px;border-radius:10px;border:2px solid #e2e8f0;background:white;color:#64748b;font-weight:800;font-size:.88rem;cursor:pointer;font-family:inherit}
.btn-back:hover{border-color:#cbd5e1;background:#f8fafc}
.score-chip{background:#fef9c3;color:#854d0e;border-radius:99px;padding:4px 14px;font-weight:800;font-size:.85rem}
.feedback{text-align:center;font-size:1.1rem;font-weight:800;min-height:30px;margin-bottom:4px}
.feedback.good{color:#16a34a} .feedback.bad{color:#dc2626}
.win-screen{display:none;text-align:center;padding:20px 0}
.win-screen .trophy{font-size:5rem;margin-bottom:10px}
.win-screen h2{font-size:1.6rem;font-weight:900;color:#1e40af;margin-bottom:8px}
.win-screen p{color:#64748b;margin-bottom:20px}
</style></head><body>
<div class="container">
  <h1>🔤 Word Scramble</h1>
  <p class="subtitle">The Best City Ever · 2do Grado</p>
  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:0%"></div></div>

  <div id="game">
    <div class="emoji-box" id="emoji"></div>
    <div class="word-hint" id="hint"></div>
    <div class="feedback" id="feedback"></div>
    <div class="answer-row" id="answer"></div>
    <div class="letters-row" id="letters"></div>
    <div class="controls">
      <button class="btn-back" onclick="erase()">⌫ Borrar</button>
    </div>
  </div>

  <div class="win-screen" id="win">
    <div class="trophy">🏆</div>
    <h2 id="win-msg">Amazing!</h2>
    <p id="win-sub"></p>
    <button class="btn" onclick="restart()">🔄 Play again</button>
  </div>
</div>
<script>
const WORDS=[{"word":"BANK","emoji":"🏦💰","display":"Bank"},{"word":"BOOKSTORE","emoji":"📚🔖","display":"Bookstore"},{"word":"BUS STOP","emoji":"🚌🛑","display":"Bus Stop"},{"word":"COMPUTER STORE","emoji":"💻🖥️","display":"Computer Store"},{"word":"GAS STATION","emoji":"⛽🚗","display":"Gas Station"},{"word":"HOSPITAL","emoji":"🏥💊","display":"Hospital"},{"word":"MOVIE THEATER","emoji":"🎬🍿","display":"Movie Theater"},{"word":"MUSIC STORE","emoji":"🎵🎸","display":"Music Store"},{"word":"PARK","emoji":"🌳🌿","display":"Park"},{"word":"PET SHOP","emoji":"🐾🐕","display":"Pet Shop"},{"word":"POST OFFICE","emoji":"📮📬","display":"Post Office"},{"word":"RESTAURANT","emoji":"🍽️🥘","display":"Restaurant"},{"word":"SCHOOL","emoji":"🏫📝","display":"School"},{"word":"SHOPPING MALL","emoji":"🛍️🏬","display":"Shopping Mall"},{"word":"SUPERMARKET","emoji":"🛒🥦","display":"Supermarket"},{"word":"TRAIN STATION","emoji":"🚂🏢","display":"Train Station"}];
let order=[],cur=0,score=0,chosen=[],tiles=[];
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function restart(){
  cur=0;score=0;chosen=[];tiles=[];
  order=shuffle(WORDS);
  document.getElementById('win').style.display='none';
  document.getElementById('game').style.display='';
  loadWord();
}
function loadWord(){
  const w=order[cur];
  chosen=[];
  document.getElementById('emoji').textContent=w.emoji;
  document.getElementById('hint').textContent='What place is this? Spell it!';
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('prog').style.width=(cur/order.length*100)+'%';
  // answer boxes
  const ans=document.getElementById('answer'); ans.innerHTML='';
  w.word.split('').forEach((_,i)=>{
    const b=document.createElement('div'); b.className='answer-box'; b.id='ab'+i;
    ans.appendChild(b);
  });
  // scramble letters
  const scrambled=shuffle(w.word.split(''));
  const lt=document.getElementById('letters'); lt.innerHTML='';
  tiles=[];
  scrambled.forEach((ch,i)=>{
    const b=document.createElement('button');
    b.className='letter-tile'; b.textContent=ch; b.id='lt'+i;
    b.onclick=()=>pick(b,ch,i);
    lt.appendChild(b); tiles.push({el:b,ch,idx:i});
  });
}
function pick(btn,ch,tIdx){
  if(btn.disabled) return;
  btn.disabled=true;
  chosen.push({ch,tIdx});
  const pos=chosen.length-1;
  const box=document.getElementById('ab'+pos);
  box.textContent=ch; box.classList.add('filled');
  if(chosen.length===order[cur].word.length) check();
}
function erase(){
  if(!chosen.length) return;
  const last=chosen.pop();
  const pos=chosen.length;
  const box=document.getElementById('ab'+pos);
  box.textContent=''; box.classList.remove('filled','correct','wrong');
  const tile=document.getElementById('lt'+last.tIdx);
  tile.disabled=false;
}
function check(){
  const built=chosen.map(x=>x.ch).join('');
  const correct=order[cur].word;
  const boxes=document.querySelectorAll('.answer-box');
  if(built===correct){
    boxes.forEach(b=>b.classList.add('correct'));
    document.getElementById('feedback').textContent='⭐ Correct!';
    document.getElementById('feedback').className='feedback good';
    score++;
    setTimeout(()=>{ cur++; if(cur<order.length) loadWord(); else showWin(); },1000);
  } else {
    boxes.forEach(b=>b.classList.add('wrong'));
    document.getElementById('feedback').textContent='❌ Try again!';
    document.getElementById('feedback').className='feedback bad';
    setTimeout(()=>{
      boxes.forEach(b=>{ b.classList.remove('wrong','filled'); b.textContent=''; });
      chosen=[];
      tiles.forEach(t=>{ t.el.disabled=false; });
      document.getElementById('feedback').textContent='';
      document.getElementById('feedback').className='feedback';
    },800);
  }
}
function showWin(){
  document.getElementById('game').style.display='none';
  document.getElementById('win').style.display='';
  document.getElementById('prog').style.width='100%';
  const pct=Math.round(score/order.length*100);
  const msg=pct===100?'Perfect! 🌟':pct>=70?'Great job! 👏':'Keep practicing! 💪';
  document.getElementById('win-msg').textContent=msg;
  document.getElementById('win-sub').textContent=`You got ${score} out of ${order.length} words right!`;
}
restart();
</script></body></html>

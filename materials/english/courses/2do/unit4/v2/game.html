<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Scramble — Unit 4 My Best City Ever</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    padding: 20px 16px 48px;
  }

  header { text-align: center; color: white; margin-bottom: 24px; }
  header h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); font-weight: 900; text-shadow: 0 2px 8px rgba(0,0,0,.25); }
  header p  { font-size: 1rem; opacity: .9; margin-top: 4px; }

  /* score bar */
  .score-bar {
    display: flex; justify-content: center; gap: 16px; flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .pill {
    background: rgba(255,255,255,.3); color: white;
    border-radius: 50px; padding: 7px 20px; font-weight: 800; font-size: 1rem;
  }

  /* progress */
  .progress-wrap {
    max-width: 520px; margin: 0 auto 22px;
  }
  .progress-label { text-align: center; color: white; font-size: .95rem; font-weight: 800; margin-bottom: 6px; }
  .progress-bar { background: rgba(255,255,255,.3); border-radius: 50px; height: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: #ffd700; border-radius: 50px; transition: width .4s ease; }

  /* game card */
  .game-card {
    background: white; border-radius: 24px; padding: 28px 20px;
    max-width: 520px; margin: 0 auto;
    box-shadow: 0 12px 40px rgba(0,0,0,.15);
  }

  .word-emoji { font-size: 4rem; text-align: center; margin-bottom: 10px; }
  .clue-text  { text-align: center; font-size: 1rem; color: #666; font-weight: 700; margin-bottom: 20px; }

  /* scrambled letters */
  .letters-pool {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 24px; min-height: 52px;
  }
  .letter-tile {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 900;
    cursor: pointer; border: none; font-family: inherit;
    box-shadow: 0 3px 8px rgba(0,0,0,.18); transition: transform .15s, box-shadow .15s;
    user-select: none;
  }
  .letter-tile:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(0,0,0,.22); }
  .letter-tile.used  { opacity: 0; pointer-events: none; }

  /* answer area */
  .answer-slots {
    display: flex; flex-wrap: wrap; gap: 8px;
    justify-content: center; margin-bottom: 24px; min-height: 52px;
  }
  .slot {
    width: 46px; height: 46px;
    background: #f3f4f6; border: 2px dashed #d1d5db; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 900; color: #333;
    cursor: pointer; transition: border-color .2s;
  }
  .slot.filled  { background: #ede9fe; border-color: #7c3aed; border-style: solid; }
  .slot.correct-slot { background: #d1fae5; border-color: #059669; border-style: solid; color: #065f46; }
  .slot.wrong-slot   { background: #fee2e2; border-color: #dc2626; border-style: solid; color: #7f1d1d; }

  /* buttons */
  .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  .btn {
    border: none; border-radius: 50px; padding: 11px 26px;
    font-family: inherit; font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: transform .2s; box-shadow: 0 4px 14px rgba(0,0,0,.15);
  }
  .btn:hover { transform: scale(1.04); }
  .btn-check  { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #333; }
  .btn-clear  { background: #f3f4f6; color: #555; }
  .btn-hint   { background: #fef3c7; color: #92400e; }
  .btn-skip   { background: #ede9fe; color: #5b21b6; }

  /* feedback */
  .feedback {
    text-align: center; font-size: 1.2rem; font-weight: 800;
    margin-top: 14px; min-height: 30px;
  }
  .feedback.ok  { color: #059669; }
  .feedback.err { color: #dc2626; }

  .reveal-label {
    text-align: center; font-size: .95rem; color: #666; margin-top: 8px; min-height: 20px;
  }

  /* confetti overlay */
  .overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.5); z-index: 100;
    align-items: center; justify-content: center;
  }
  .overlay.show { display: flex; }
  .popup {
    background: white; border-radius: 28px; padding: 40px 32px;
    text-align: center; max-width: 380px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,.35);
    animation: popIn .4s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes popIn { from { transform: scale(.6); opacity: 0; } to { transform: scale(1); opacity:1; } }
  .popup .big { font-size: 4rem; margin-bottom: 12px; }
  .popup h2   { font-size: 1.8rem; font-weight: 900; color: #0284c7; margin-bottom: 8px; }
  .popup p    { color: #555; font-size: 1rem; margin-bottom: 6px; }
  .popup .final-score { font-size: 2.5rem; font-weight: 900; color: #f59e0b; margin: 10px 0; }
  .popup button {
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    color: white; border: none; border-radius: 50px;
    padding: 12px 30px; font-family: inherit; font-size: 1rem; font-weight: 800;
    cursor: pointer; margin: 6px; transition: transform .2s;
  }
  .popup button:hover { transform: scale(1.05); }

  /* hint letters shown */
  .hint-used { font-size: .8rem; color: #92400e; text-align: center; margin-top: 4px; }
</style>
</head>
<body>

<header>
  <h1>🔤 Word Scramble!</h1>
  <p>Unit 4 · 2do Grado · Unscramble the words</p>
</header>

<div class="score-bar">
  <div class="pill">⭐ <span id="score-disp">0</span> pts</div>
  <div class="pill">✅ <span id="correct-disp">0</span> correct</div>
  <div class="pill">💡 <span id="hints-disp">3</span> hints left</div>
</div>

<div class="progress-wrap">
  <div class="progress-label" id="prog-label">Word 1 of 12</div>
  <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
</div>

<div class="game-card">
  <div class="word-emoji" id="word-emoji"></div>
  <div class="clue-text"  id="clue-text"></div>
  <div class="letters-pool" id="letters-pool"></div>
  <div class="answer-slots" id="answer-slots"></div>
  <div class="btn-row">
    <button class="btn btn-check" onclick="checkAnswer()">✔ Check</button>
    <button class="btn btn-clear" onclick="clearAnswer()">↩ Clear</button>
    <button class="btn btn-hint"  onclick="useHint()">💡 Hint</button>
    <button class="btn btn-skip"  onclick="skipWord()">⏭ Skip</button>
  </div>
  <div class="feedback" id="feedback"></div>
  <div class="reveal-label" id="reveal-label"></div>
</div>

<div class="overlay" id="overlay">
  <div class="popup">
    <div class="big">🏆</div>
    <h2>Game Over!</h2>
    <p>You completed all 12 words!</p>
    <div class="final-score" id="final-score"></div>
    <p id="final-msg"></p>
    <button onclick="restartGame()">Play Again 🔄</button>
  </div>
</div>

<script>
const WORDS = [
  { word: 'BANK',         emoji: '🏦', clue: 'A place to save money' },
  { word: 'PARK',         emoji: '🌳', clue: 'A place to play outside' },
  { word: 'SCHOOL',       emoji: '🏫', clue: 'A place to learn' },
  { word: 'HOSPITAL',     emoji: '🏥', clue: 'A place to see a doctor' },
  { word: 'RESTAURANT',   emoji: '🍕', clue: 'A place to eat food' },
  { word: 'SUPERMARKET',  emoji: '🛒', clue: 'A place to buy fruits' },
  { word: 'BOOKSTORE',    emoji: '📚', clue: 'A place to buy books' },
  { word: 'DOCTOR',       emoji: '👨‍⚕️', clue: 'This person helps sick people' },
  { word: 'TEACHER',      emoji: '👩‍🏫', clue: 'This person teaches you' },
  { word: 'SINGER',       emoji: '🎤', clue: 'This person sings songs' },
  { word: 'PILOT',        emoji: '✈️', clue: 'This person flies planes' },
  { word: 'CHEF',         emoji: '👨‍🍳', clue: 'This person cooks food' },
];

let deck      = [];
let wIndex    = 0;
let score     = 0;
let correct   = 0;
let hintsLeft = 3;
let placed    = [];   // array of { letterIndex, char } or null per slot
let tiles     = [];   // array of { char, el, used }
let hintCount = 0;    // hints used on current word

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function restartGame() {
  score = 0; correct = 0; hintsLeft = 3; wIndex = 0;
  deck = shuffle([...WORDS]);
  document.getElementById('overlay').classList.remove('show');
  updateStats();
  loadWord();
}

function loadWord() {
  hintCount = 0;
  const w = deck[wIndex];
  document.getElementById('word-emoji').textContent = w.emoji;
  document.getElementById('clue-text').textContent  = '🔍 Clue: ' + w.clue;
  document.getElementById('feedback').textContent   = '';
  document.getElementById('feedback').className     = 'feedback';
  document.getElementById('reveal-label').textContent = '';

  const letters = shuffle([...w.word]);
  placed = Array(w.word.length).fill(null);
  tiles  = letters.map((ch, i) => ({ char: ch, used: false, el: null }));

  // render pool
  const pool = document.getElementById('letters-pool');
  pool.innerHTML = '';
  tiles.forEach((t, i) => {
    const btn = document.createElement('button');
    btn.className = 'letter-tile';
    btn.textContent = t.ch;
    btn.onclick = () => placeLetter(i);
    t.el = btn;
    pool.appendChild(btn);
  });

  // render slots
  const slotsEl = document.getElementById('answer-slots');
  slotsEl.innerHTML = '';
  for (let i = 0; i < w.word.length; i++) {
    const s = document.createElement('div');
    s.className = 'slot';
    s.dataset.idx = i;
    s.onclick = () => removeFromSlot(i);
    slotsEl.appendChild(s);
  }

  updateProgress();
}

function placeLetter(tileIdx) {
  const t = tiles[tileIdx];
  if (t.used) return;
  // find first empty slot
  const emptyIdx = placed.indexOf(null);
  if (emptyIdx === -1) return;

  placed[emptyIdx] = tileIdx;
  t.used = true;
  t.el.classList.add('used');

  const slotEl = document.querySelector(`.slot[data-idx="${emptyIdx}"]`);
  slotEl.textContent = t.char;
  slotEl.classList.add('filled');
  slotEl.classList.remove('correct-slot', 'wrong-slot');
}

function removeFromSlot(slotIdx) {
  const tileIdx = placed[slotIdx];
  if (tileIdx === null) return;

  placed[slotIdx] = null;
  tiles[tileIdx].used = false;
  tiles[tileIdx].el.classList.remove('used');

  const slotEl = document.querySelector(`.slot[data-idx="${slotIdx}"]`);
  slotEl.textContent = '';
  slotEl.classList.remove('filled','correct-slot','wrong-slot');
}

function clearAnswer() {
  placed.forEach((tileIdx, slotIdx) => {
    if (tileIdx !== null) {
      tiles[tileIdx].used = false;
      tiles[tileIdx].el.classList.remove('used');
    }
  });
  placed.fill(null);
  document.querySelectorAll('.slot').forEach(s => {
    s.textContent = ''; s.classList.remove('filled','correct-slot','wrong-slot');
  });
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className   = 'feedback';
}

function checkAnswer() {
  if (placed.includes(null)) {
    document.getElementById('feedback').textContent = '⬆️ Fill all letters first!';
    document.getElementById('feedback').className   = 'feedback err';
    return;
  }
  const attempt = placed.map(i => tiles[i].char).join('');
  const target  = deck[wIndex].word;
  const slots   = document.querySelectorAll('.slot');

  if (attempt === target) {
    slots.forEach(s => { s.classList.add('correct-slot'); s.classList.remove('filled'); });
    document.getElementById('feedback').textContent = '✅ Correct! Well done! 🎉';
    document.getElementById('feedback').className   = 'feedback ok';
    const pts = Math.max(10 - hintCount * 3, 1);
    score   += pts;
    correct += 1;
    updateStats();
    setTimeout(nextWord, 1100);
  } else {
    slots.forEach(s => { s.classList.add('wrong-slot'); s.classList.remove('filled'); });
    document.getElementById('feedback').textContent = '❌ Not quite! Try again!';
    document.getElementById('feedback').className   = 'feedback err';
    setTimeout(() => {
      slots.forEach(s => { s.classList.remove('wrong-slot'); s.classList.add('filled'); });
      document.getElementById('feedback').textContent = '';
    }, 700);
  }
}

function useHint() {
  if (hintsLeft <= 0) {
    document.getElementById('feedback').textContent = '😅 No hints left!';
    document.getElementById('feedback').className   = 'feedback err';
    return;
  }
  // reveal next correct letter in the first empty or wrong slot
  const target = deck[wIndex].word;
  let revealed = false;
  for (let slotIdx = 0; slotIdx < placed.length; slotIdx++) {
    if (placed[slotIdx] === null) {
      // find correct letter tile for this position
      const neededChar = target[slotIdx];
      // find an unused tile with this char
      const tileIdx = tiles.findIndex((t, i) => !t.used && t.char === neededChar);
      if (tileIdx !== -1) {
        placeLetter(tileIdx);
        hintsLeft--; hintCount++;
        updateStats();
        document.getElementById('feedback').textContent = `💡 Hint used! (${hintsLeft} left)`;
        document.getElementById('feedback').className   = 'feedback';
        revealed = true;
        break;
      }
    }
  }
  if (!revealed) {
    document.getElementById('feedback').textContent = '✨ All letters are placed!';
    document.getElementById('feedback').className   = 'feedback';
  }
}

function skipWord() {
  const target = deck[wIndex].word;
  document.getElementById('reveal-label').textContent = `The word was: ${target}`;
  setTimeout(nextWord, 1400);
}

function nextWord() {
  wIndex++;
  if (wIndex >= deck.length) {
    showFinal();
  } else {
    loadWord();
  }
}

function updateProgress() {
  const pct = (wIndex / deck.length) * 100;
  document.getElementById('prog-fill').style.width    = pct + '%';
  document.getElementById('prog-label').textContent   = `Word ${wIndex+1} of ${deck.length}`;
}

function updateStats() {
  document.getElementById('score-disp').textContent   = score;
  document.getElementById('correct-disp').textContent = correct;
  document.getElementById('hints-disp').textContent   = hintsLeft;
}

function showFinal() {
  document.getElementById('final-score').textContent = score + ' pts  ·  ' + correct + '/' + WORDS.length + ' correct';
  let msg = '';
  if (correct === WORDS.length)    msg = '🌟 PERFECT! You know all the words!';
  else if (correct >= WORDS.length * .7) msg = '👏 Great job! Keep practicing!';
  else                              msg = '💪 Good try! Play again to improve!';
  document.getElementById('final-msg').textContent = msg;
  document.getElementById('overlay').classList.add('show');
}

restartGame();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guía Ingeniería 3D — 5to Grado</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: #0f172a;
      background-image: radial-gradient(rgba(148,163,184,.12) 1px, transparent 1px);
      background-size: 24px 24px;
      min-height: 100vh;
      padding: 24px 16px 64px;
      color: #e2e8f0;
    }

    .header { text-align: center; margin-bottom: 24px; }
    .header .icon { font-size: 2.6rem; display: block; margin-bottom: 6px; }
    .header h1 { font-size: 1.65rem; font-weight: 900; color: #f1f5f9; }
    .header .sub { color: #475569; font-size: 0.83rem; margin-top: 4px; font-weight: 700; letter-spacing: .4px; }

    /* Module filter */
    .mod-filter {
      display: flex; gap: 6px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 18px;
      max-width: 660px; margin-inline: auto;
    }
    .mod-btn {
      padding: 7px 14px; border-radius: 99px; border: none;
      font-family: inherit; font-size: 0.78rem; font-weight: 800;
      cursor: pointer; background: #1e293b; color: #475569;
      border: 1px solid #334155; transition: all .2s;
    }
    .mod-btn:hover { border-color: #475569; color: #94a3b8; }
    .mod-btn.active { color: white; border-color: transparent; }

    /* Class list */
    .class-list { max-width: 660px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }
    .cls-wrap { border-radius: 16px; overflow: hidden; border: 1px solid #334155; }

    .cls-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; cursor: pointer; user-select: none;
      background: #1e293b; border-bottom: 1px solid transparent; transition: background .15s;
    }
    .cls-header:hover { background: #243347; }
    .cls-wrap.open .cls-header { border-bottom-color: #334155; }

    .cls-num-badge {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.83rem; font-weight: 900; color: white;
    }
    .cls-hinfo { flex: 1; min-width: 0; }
    .cls-htitle { font-size: 0.9rem; font-weight: 900; line-height: 1.3; color: #e2e8f0; }
    .cls-hmeta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; align-items: center; }

    .badge { font-size: 0.61rem; font-weight: 800; padding: 2px 8px; border-radius: 99px; }
    .b-inv   { background: rgba(20,184,166,.18); color: #5eead4; }
    .b-tol   { background: rgba(99,102,241,.18); color: #a5b4fc; }
    .b-opt   { background: rgba(245,158,11,.18); color: #fcd34d; }
    .b-func  { background: rgba(249,115,22,.18); color: #fdba74; }
    .b-eng   { background: rgba(236,72,153,.18); color: #f9a8d4; }

    .cls-dur { font-size: 0.7rem; color: #475569; font-weight: 700; }
    .cls-diff { font-size: 0.68rem; }
    .cls-chevron { color: #334155; font-size: 1.2rem; transition: transform .25s; flex-shrink: 0; }
    .cls-wrap.open .cls-chevron { transform: rotate(90deg); }

    /* Guide content */
    .cls-guide { display: none; background: #1a2537; }
    .cls-wrap.open .cls-guide { display: block; }

    .guide-section { padding: 16px 20px; border-bottom: 1px solid #1e293b; }
    .guide-section:last-child { border-bottom: none; }
    .gs-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.72rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: .6px; color: #475569; margin-bottom: 10px;
    }

    /* Objetivo */
    .objetivo-text {
      font-size: 0.9rem; font-weight: 700; color: #e2e8f0;
      background: #1e293b; border-radius: 10px; padding: 11px 14px;
      border-left: 3px solid #6366f1; line-height: 1.5;
    }

    /* Conceptos clave */
    .conceptos { display: flex; flex-wrap: wrap; gap: 8px; }
    .concepto {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 10px; padding: 9px 13px;
    }
    .concepto-term { font-size: 0.82rem; font-weight: 900; color: #a5b4fc; margin-bottom: 2px; }
    .concepto-def  { font-size: 0.75rem; font-weight: 700; color: #475569; line-height: 1.4; }

    /* Necesitás */
    .needs-list { display: flex; flex-direction: column; gap: 6px; }
    .need-item { display: flex; align-items: flex-start; gap: 8px; font-size: 0.83rem; font-weight: 700; color: #94a3b8; }
    .need-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* Config Bambu */
    .bambu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .bambu-item { background: #1e293b; border-radius: 10px; padding: 10px 12px; border: 1px solid #1d4ed8; }
    .bambu-label { font-size: 0.66rem; font-weight: 900; color: #60a5fa; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .bambu-val { font-size: 0.86rem; font-weight: 800; color: #bfdbfe; }

    /* Steps */
    .steps-list { display: flex; flex-direction: column; gap: 8px; }
    .step { display: flex; gap: 10px; align-items: flex-start; }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; font-weight: 900; color: white; margin-top: 2px;
    }
    .step-text { font-size: 0.85rem; font-weight: 700; color: #94a3b8; line-height: 1.55; flex: 1; }
    .step-text strong { color: #e2e8f0; }

    /* Para pensar */
    .reflexion-list { display: flex; flex-direction: column; gap: 8px; }
    .reflexion {
      display: flex; gap: 8px; align-items: flex-start;
      background: #1e293b; border-radius: 10px; padding: 10px 13px;
      border: 1px solid #334155;
    }
    .ref-icon { font-size: 1rem; flex-shrink: 0; }
    .ref-text { font-size: 0.82rem; font-weight: 700; color: #94a3b8; line-height: 1.5; }

    /* Tips */
    .tips-list { display: flex; flex-direction: column; gap: 8px; }
    .tip {
      display: flex; gap: 8px; align-items: flex-start;
      background: rgba(250,204,21,.06); border-radius: 10px; padding: 10px 12px;
      border: 1px solid rgba(250,204,21,.15);
    }
    .tip-icon { font-size: 1rem; flex-shrink: 0; }
    .tip-text { font-size: 0.82rem; font-weight: 700; color: #a16207; line-height: 1.5; }
    .tip-text { color: #fde68a; }

    /* Alert */
    .extra-alert {
      background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.25);
      border-radius: 10px; padding: 10px 14px;
      font-size: 0.82rem; font-weight: 800; color: #fca5a5;
      display: flex; gap: 8px; align-items: flex-start; margin-top: 8px;
    }

    footer { text-align: center; margin-top: 40px; color: #334155; font-size: 0.73rem; font-weight: 700; }

    @media (max-width: 480px) {
      .cls-header { padding: 12px 14px; }
      .guide-section { padding: 14px 15px; }
      .bambu-grid { grid-template-columns: 1fr; }
      .conceptos { flex-direction: column; }
    }
  </style>
</head>
<body>

<header class="header">
  <span class="icon">📐</span>
  <h1>Guía de Clases</h1>
  <p class="sub">INGENIERÍA 3D · 5TO GRADO · BAMBU LAB A1 + TINKERCAD</p>
</header>

<div class="mod-filter" id="mod-filter"></div>
<div class="class-list" id="class-list"></div>

<footer>Ingeniería 3D · 5to Grado · Kodingo School</footer>

<script>
const MOD_COLORS = ['#0f766e','#1d4ed8','#b45309','#7c3aed','#be123c'];

const CLASSES = [
  /* ─── MÓDULO 1 ─────────────────────────────────── */
  {

    conceptos:[

      { icon:'📦', text:'Objeto cotidiano pequeño: goma, lapicera, tarjetero, etc.' },

      { s:'Identificá qué formas básicas de Tinkercad usarías: cajas, cilindros, esferas, etc.' },
      { s:'Hacé una lista de "ingredientes": "2 cajas + 1 cilindro + 1 hole".' }

    reflexion:[

    tips:[

  {

    steps:[
      { s:'Abrí Tinkercad → New 3D Design. Poné el boceto <strong>visible al lado de la pantalla</strong>.' },
      { s:'Empezá por la <strong>forma más grande</strong>. Usá las cotas del boceto como referencia.' },
      { s:'Agregá las formas secundarias. Usá <strong>Align</strong> para centrar con precisión.' },
      { s:'Aplicá los holes donde corresponda (partes huecas del objeto original).' },
      { s:'Comparación intermedia: mirá el modelo desde las mismas 3 vistas del boceto. ¿Coinciden las proporciones?' },

    reflexion:[
      '¿Qué fue lo más difícil de reproducir? ¿Por qué?',
      '¿Hay alguna forma en el objeto real que no podés hacer en Tinkercad? ¿Qué harías?'

    tips:[

  {

    needs:[

      { icon:'🖨️', text:'Bambu Lab A1 + filamento PLA' },
      { icon:'📏', text:'Calibre para medir la pieza impresa' },
      { icon:'📄', text:'Tabla de comparación (papel y lápiz)' }

    bambu:{ perfil:'0.20mm Standard', filamento:'PLA', infill:'15%', soportes:'Según diseño', extra:null },

      { s:'Cuando esté fría, medí con el calibre las mismas dimensiones que mediste en el objeto original.' },

      'Guardá esta tabla: vas a necesitarla para calcular tolerancias en la Clase 5.'

  /* ─── MÓDULO 2 ─────────────────────────────────── */

    num:4, mod:2, type:'tol', dur:'45 min', diff:3,

    needs:[

      { icon:'🖨️', text:'Bambu Lab A1 + PLA' },
      { icon:'📏', text:'Calibre' }
    ],
    bambu:{ perfil:'0.20mm Standard', filamento:'PLA', infill:'20%', soportes:'No', extra:'Imprimí los 3 cubos juntos en un solo trabajo' },
    steps:[
      { s:'Diseñá en Tinkercad 3 cubos: <strong>20×20×20mm</strong>, <strong>30×30×30mm</strong> y <strong>50×50×20mm</strong>.' },
      { s:'Exportá los 3 en un mismo STL. En Bambu Studio, ponelos separados en la placa.' },
      { s:'Imprimí con infill 20% para que sean sólidos y fáciles de medir.' },
      { s:'Cuando estén fríos, medí cada dimensión de los 3 cubos con el calibre. Anotá todo.' },
      { s:'Calculá el error promedio en X, Y y Z para cada cubo.' },
      { s:'¿El error escala con el tamaño? Hacé la tabla: error en mm y error en %.' },

    reflexion:[
      '¿El error en porcentaje es constante sin importar el tamaño del objeto?',

    tips:[

      { icon:'🖨️', text:'Bambu Lab A1 + PLA' },

    bambu:{ perfil:'0.20mm Standard', filamento:'PLA', infill:'20%', soportes:'No', extra:'Imprimí macho y hembra en el mismo trabajo' },

function stars(n) { return '★'.repeat(n) + '☆'.repeat(5-n); }
let activeFilter = 0, openClass = null;

function renderFilter() {
  document.getElementById('mod-filter').innerHTML = MODS.map(m => `
    <button class="mod-btn${m.num===activeFilter?' active':''}"
      style="${m.num===activeFilter?`background:${m.color}`:''}"
      onclick="setFilter(${m.num})">${m.label}</button>`).join('');
}

function setFilter(n) { activeFilter = n; renderFilter(); renderList(); }

function toggleClass(num) {
  openClass = openClass === num ? null : num;
  document.querySelectorAll('.cls-wrap').forEach(el => {
    el.classList.toggle('open', parseInt(el.dataset.cls) === openClass);
  });
  if (openClass !== null) {
    const el = document.querySelector(`[data-cls="${openClass}"]`);
    if (el) setTimeout(() => el.scrollIntoView({behavior:'smooth', block:'nearest'}), 50);
  }
}

function renderList() {
  const filtered = activeFilter === 0 ? CLASSES : CLASSES.filter(c => c.mod === activeFilter);
  const color = mod => MOD_COLORS[mod-1];

  document.getElementById('class-list').innerHTML = filtered.map(c => {
    const t = TYPE[c.type];
    return `
    <div class="cls-wrap${c.num===openClass?' open':''}" data-cls="${c.num}">
      <div class="cls-header" onclick="toggleClass(${c.num})">
        <div class="cls-num-badge" style="background:${color(c.mod)}">C${c.num}</div>
        <div class="cls-hinfo">
          <div class="cls-htitle">${c.name}</div>
          <div class="cls-hmeta">
            <span class="badge ${t.cls}">${t.label}</span>
            <span class="cls-dur">⏱️ ${c.dur}</span>
            <span class="cls-diff">${stars(c.diff)}</span>
          </div>
        </div>
        <span class="cls-chevron">›</span>
      </div>
      <div class="cls-guide">

        <div class="guide-section">
          <div class="gs-title">🎯 Objetivo</div>
          <div class="objetivo-text">${c.objetivo}</div>
        </div>

        <div class="guide-section">
          <div class="gs-title">💡 Conceptos clave</div>
          <div class="conceptos">
            ${c.conceptos.map(cv => `
              <div class="concepto">

                <div class="concepto-def">${cv.d}</div>

          </div>
        </div>

        <div class="guide-section">
          <div class="gs-title">🛠️ Necesitás</div>
          <div class="needs-list">
            ${c.needs.map(n => `
              <div class="need-item"><span class="need-icon">${n.icon}</span><span>${n.text}</span></div>`).join('')}
          </div>
        </div>

        ${c.bambu ? `
        <div class="guide-section">
          <div class="gs-title">⚙️ Configuración Bambu Lab A1</div>
          <div class="bambu-grid">
            <div class="bambu-item"><div class="bambu-label">Perfil</div><div class="bambu-val">${c.bambu.perfil}</div></div>
            <div class="bambu-item"><div class="bambu-label">Filamento</div><div class="bambu-val">${c.bambu.filamento}</div></div>
            <div class="bambu-item"><div class="bambu-label">Infill</div><div class="bambu-val">${c.bambu.infill}</div></div>
            <div class="bambu-item"><div class="bambu-label">Soportes</div><div class="bambu-val">${c.bambu.soportes}</div></div>
            ${c.bambu.extra ? `<div class="bambu-item" style="grid-column:1/-1"><div class="bambu-label">Nota</div><div class="bambu-val">${c.bambu.extra}</div></div>` : ''}
          </div>
        </div>` : ''}

        <div class="guide-section">
          <div class="gs-title">📋 Pasos</div>
          <div class="steps-list">
            ${c.steps.filter(s => typeof s === 'object' && s.s).map((s,i) => `
              <div class="step">
                <div class="step-num" style="background:${color(c.mod)}">${i+1}</div>
                <div class="step-text">${s.s}</div>
              </div>`).join('')}
          </div>
        </div>

        <div class="guide-section">
          <div class="gs-title">🤔 Para pensar</div>
          <div class="reflexion-list">
            ${c.reflexion.map(r => `
              <div class="reflexion"><span class="ref-icon">💭</span><span class="ref-text">${r}</span></div>`).join('')}
          </div>
        </div>

        <div class="guide-section">
          <div class="gs-title">💡 Tips</div>
          <div class="tips-list">
            ${c.tips.filter(tip => typeof tip === 'string').map(tip => `
              <div class="tip"><span class="tip-icon">💡</span><span class="tip-text">${tip}</span></div>`).join('')}
          </div>
        </div>

      </div>
    </div>`;
  }).join('');
}

renderFilter();
renderList();
</script>
</body>
</html>

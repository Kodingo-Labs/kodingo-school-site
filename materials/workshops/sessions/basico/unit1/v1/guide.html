<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guía de Clases — Studio 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --m1: #f97316; --m2: #2563eb; --m3: #9333ea;
      --m4: #16a34a; --m5: #d97706;
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: #f1f5f9;
      background-image: radial-gradient(#cbd5e1 1px, transparent 1px);
      background-size: 22px 22px;
      min-height: 100vh;
      padding: 24px 16px 64px;
      color: #1e293b;
    }

    .header { text-align: center; margin-bottom: 24px; }
    .header .icon { font-size: 2.8rem; display: block; margin-bottom: 6px; }
    .header h1 { font-size: 1.7rem; font-weight: 900; }
    .header .sub { color: #64748b; font-size: 0.85rem; margin-top: 4px; font-weight: 600; }

    /* Module filter */
    .mod-filter {
      display: flex; gap: 6px; justify-content: center;
      flex-wrap: wrap; margin-bottom: 20px;
      max-width: 640px; margin-inline: auto;
    }
    .mod-btn {
      padding: 7px 16px; border-radius: 99px; border: none;
      font-family: inherit; font-size: 0.8rem; font-weight: 800;
      cursor: pointer; background: white; color: #64748b;
      box-shadow: 0 2px 8px rgba(0,0,0,.06); transition: all .2s;
    }
    .mod-btn:hover { transform: translateY(-1px); }
    .mod-btn.active { color: white; box-shadow: 0 3px 12px rgba(0,0,0,.2); }

    /* Class list */
    .class-list { max-width: 640px; margin: 0 auto; display: flex; flex-direction: column; gap: 10px; }

    .cls-wrap { border-radius: 16px; overflow: hidden; box-shadow: 0 3px 14px rgba(0,0,0,.07); }

    .cls-header {
      display: flex; align-items: center; gap: 12px;
      padding: 14px 18px; cursor: pointer; user-select: none;
      background: white; border-bottom: 1px solid transparent;
      transition: background .15s;
    }
    .cls-header:hover { background: #fafafa; }
    .cls-wrap.open .cls-header { border-bottom-color: #f1f5f9; }

    .cls-num-badge {
      width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; font-weight: 900; color: white;
    }
    .cls-hinfo { flex: 1; min-width: 0; }
    .cls-htitle { font-size: 0.92rem; font-weight: 900; line-height: 1.3; }
    .cls-hmeta { display: flex; gap: 8px; margin-top: 3px; flex-wrap: wrap; align-items: center; }

    .badge {
      font-size: 0.62rem; font-weight: 800; padding: 2px 8px; border-radius: 99px;
    }
    .b-print  { background: #fff7ed; color: #ea580c; }
    .b-design { background: #eff6ff; color: #2563eb; }
    .b-adv    { background: #faf5ff; color: #9333ea; }

    .cls-dur { font-size: 0.72rem; color: #94a3b8; font-weight: 700; }
    .cls-diff { font-size: 0.7rem; }
    .cls-chevron { color: #cbd5e1; font-size: 1.2rem; transition: transform .25s; flex-shrink: 0; }
    .cls-wrap.open .cls-chevron { transform: rotate(90deg); }

    /* Guide content */
    .cls-guide { display: none; background: white; }
    .cls-wrap.open .cls-guide { display: block; }

    .guide-section {
      padding: 16px 20px;
      border-bottom: 1px solid #f8fafc;
    }
    .guide-section:last-child { border-bottom: none; }

    .gs-title {
      display: flex; align-items: center; gap: 7px;
      font-size: 0.78rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: .6px; color: #94a3b8; margin-bottom: 10px;
    }

    /* Objetivo */
    .objetivo-text {
      font-size: 0.92rem; font-weight: 700; color: #1e293b;
      background: #f8fafc; border-radius: 10px; padding: 11px 14px;
      border-left: 3px solid #4f46e5;
      line-height: 1.5;
    }

    /* Necesitas */
    .needs-list { display: flex; flex-direction: column; gap: 6px; }
    .need-item {
      display: flex; align-items: flex-start; gap: 8px;
      font-size: 0.85rem; font-weight: 700; color: #334155;
    }
    .need-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }

    /* Config Bambu */
    .bambu-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    }
    .bambu-item {
      background: #f0f9ff; border-radius: 10px; padding: 10px 12px;
      border: 1.5px solid #bae6fd;
    }
    .bambu-label { font-size: 0.68rem; font-weight: 900; color: #0284c7; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .bambu-val { font-size: 0.88rem; font-weight: 800; color: #0c4a6e; }

    /* Steps */
    .steps-list { display: flex; flex-direction: column; gap: 8px; }
    .step {
      display: flex; gap: 10px; align-items: flex-start;
    }
    .step-num {
      width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 900; color: white;
      margin-top: 1px;
    }
    .step-text { font-size: 0.87rem; font-weight: 700; color: #334155; line-height: 1.5; flex: 1; }
    .step-text strong { color: #1e293b; }

    /* Subsection divider inside steps */
    .step-divider {
      font-size: 0.72rem; font-weight: 900; text-transform: uppercase;
      letter-spacing: .5px; color: #94a3b8; padding: 4px 0 2px;
      border-bottom: 1px solid #f1f5f9; margin-bottom: 4px;
    }

    /* Tips */
    .tips-list { display: flex; flex-direction: column; gap: 8px; }
    .tip {
      display: flex; gap: 8px; align-items: flex-start;
      background: #fefce8; border-radius: 10px; padding: 10px 12px;
      border: 1.5px solid #fde68a;
    }
    .tip-icon { font-size: 1rem; flex-shrink: 0; }
    .tip-text { font-size: 0.83rem; font-weight: 700; color: #78350f; line-height: 1.5; }

    /* Extra materials alert */
    .extra-alert {
      background: #fff7ed; border: 2px solid #fed7aa; border-radius: 10px;
      padding: 10px 14px; font-size: 0.83rem; font-weight: 800; color: #c2410c;
      display: flex; gap: 8px; align-items: flex-start;
    }

    footer { text-align: center; margin-top: 40px; color: #94a3b8; font-size: 0.75rem; font-weight: 700; }

    @media (max-width: 480px) {
      .cls-header { padding: 12px 14px; gap: 10px; }
      .guide-section { padding: 14px 16px; }
      .bambu-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="mod-filter" id="mod-filter"></div>
<div class="class-list" id="class-list"></div>

const MODS = [
  { num:0, label:'Todas', color:'#4f46e5' },
  { num:1, label:'M1 · Imprimir', color:'#f97316' },
  { num:2, label:'M2 · Diseños', color:'#2563eb' },
  { num:3, label:'M3 · Texto', color:'#9333ea' },
  { num:4, label:'M4 · Proyectos', color:'#16a34a' },
  { num:5, label:'M5 · Final', color:'#d97706' },
];

const TYPE = {
  print:  { label:'🖨️ Solo imprime', cls:'b-print' },
  design: { label:'✏️ Diseña e imprime', cls:'b-design' },
  adv:    { label:'⭐ Diseño avanzado', cls:'b-adv' },
};

function stars(n) { return '⭐'.repeat(n) + '☆'.repeat(5-n); }

let activeFilter = 0;
let openClass = null;

function renderFilter() {
  document.getElementById('mod-filter').innerHTML = MODS.map(m => `
    <button class="mod-btn${m.num === activeFilter ? ' active' : ''}"
      style="${m.num === activeFilter ? `background:${m.color}` : ''}"
      onclick="setFilter(${m.num})">${m.label}</button>`).join('');
}

function setFilter(n) {
  activeFilter = n;
  renderFilter();
  renderList();
}

function toggleClass(num) {
  openClass = openClass === num ? null : num;
  document.querySelectorAll('.cls-wrap').forEach(el => {
    const n = parseInt(el.dataset.cls);
    el.classList.toggle('open', n === openClass);
  });
  if (openClass !== null) {
    const el = document.querySelector(`[data-cls="${openClass}"]`);
    if (el) setTimeout(() => el.scrollIntoView({ behavior:'smooth', block:'nearest' }), 50);
  }
}

function renderList() {
  const filtered = activeFilter === 0 ? CLASSES : CLASSES.filter(c => c.mod === activeFilter);
  const color = (mod) => MOD_COLORS[mod - 1];
  const t = (c) => TYPE[c.type];

  document.getElementById('class-list').innerHTML = filtered.map(c => `
    <div class="cls-wrap${c.num === openClass ? ' open' : ''}" data-cls="${c.num}">

      <div class="cls-header" onclick="toggleClass(${c.num})">
        <div class="cls-num-badge" style="background:${color(c.mod)}">C${c.num}</div>
        <div class="cls-hinfo">
          <div class="cls-htitle">${c.name}</div>
          <div class="cls-hmeta">
            <span class="badge ${t(c).cls}">${t(c).label}</span>
            <span class="cls-dur">⏱️ ${c.dur}</span>
            <span class="cls-diff">${stars(c.diff)}</span>
          </div>
        </div>
        <span class="cls-chevron">›</span>
      </div>

      <div class="cls-guide">

        <div class="guide-section">
          <div class="gs-title"><span>🎯</span> Objetivo</div>
          <div class="objetivo-text">${c.objetivo}</div>
        </div>

        <div class="guide-section">
          <div class="gs-title"><span>🛠️</span> Necesitás</div>
          <div class="needs-list">
            ${c.needs.map(n => `
              <div class="need-item">
                <span class="need-icon">${n.icon}</span>
                <span>${n.text}</span>
              </div>`).join('')}
            ${c.extra_alert ? `<div class="extra-alert">⚠️ <span>${c.extra_alert}</span></div>` : ''}
          </div>
        </div>

        ${c.bambu.perfil !== '—' ? `
        <div class="guide-section">
          <div class="gs-title"><span>⚙️</span> Configuración Bambu Lab A1</div>
          <div class="bambu-grid">
            <div class="bambu-item">
              <div class="bambu-label">Perfil</div>
              <div class="bambu-val">${c.bambu.perfil}</div>
            </div>
            <div class="bambu-item">
              <div class="bambu-label">Filamento</div>
              <div class="bambu-val">${c.bambu.filamento}</div>
            </div>
            <div class="bambu-item">
              <div class="bambu-label">Infill</div>
              <div class="bambu-val">${c.bambu.infill}</div>
            </div>
            <div class="bambu-item">
              <div class="bambu-label">Soportes</div>
              <div class="bambu-val">${c.bambu.soportes}</div>
            </div>
            ${c.bambu.extra ? `<div class="bambu-item" style="grid-column:1/-1">
              <div class="bambu-label">Nota</div>
              <div class="bambu-val">${c.bambu.extra}</div>
            </div>` : ''}
          </div>
        </div>` : ''}

        <div class="guide-section">
          <div class="gs-title"><span>📋</span> Pasos</div>
          <div class="steps-list">
            ${c.steps.map((s, i) => `
              <div class="step">
                <div class="step-num" style="background:${color(c.mod)}">${i+1}</div>
                <div class="step-text">${s.s}</div>
              </div>`).join('')}
          </div>
        </div>

        <div class="guide-section">
          <div class="gs-title"><span>💡</span> Tips</div>
          <div class="tips-list">
            ${c.tips.map(tip => `
              <div class="tip">
                <span class="tip-icon">💡</span>
                <span class="tip-text">${tip}</span>
              </div>`).join('')}
          </div>
        </div>

      </div>
    </div>`).join('');
}

renderFilter();
renderList();
</script>
